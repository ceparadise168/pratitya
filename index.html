<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>緣</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; cursor: none; }
canvas {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
}
#trace { z-index: 0; }
#main  { z-index: 1; }
</style>
</head>
<body>
<canvas id="trace"></canvas>
<canvas id="main"></canvas>
<script>
// === CANVAS SETUP ===
const mainCanvas = document.getElementById('main');
const traceCanvas = document.getElementById('trace');
const ctx = mainCanvas.getContext('2d');
const traceCtx = traceCanvas.getContext('2d');
let W, H;

function resize() {
  W = mainCanvas.width = traceCanvas.width = innerWidth;
  H = mainCanvas.height = traceCanvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

// === AGENTS 眾生 ===
const NUM_AGENTS = 200;
const agents = [];
for (let i = 0; i < NUM_AGENTS; i++) {
  agents.push({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    vx: 0,
    vy: 0,
    size: 1 + Math.random() * 2,
    phase: Math.random() * Math.PI * 2,
  });
}

// === MAIN LOOP ===
function loop(t) {
  ctx.clearRect(0, 0, W, H);

  for (const a of agents) {
    ctx.beginPath();
    ctx.arc(a.x, a.y, a.size, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180, 180, 200, 0.6)';
    ctx.fill();
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
