<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>緣</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; cursor: none; }
canvas {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
}
#trace { z-index: 0; }
#main  { z-index: 1; }
</style>
</head>
<body>
<canvas id="trace"></canvas>
<canvas id="main"></canvas>
<script>
// === CANVAS SETUP ===
const mainCanvas = document.getElementById('main');
const traceCanvas = document.getElementById('trace');
const ctx = mainCanvas.getContext('2d');
const traceCtx = traceCanvas.getContext('2d');
let W, H;

function resize() {
  W = mainCanvas.width = traceCanvas.width = innerWidth;
  H = mainCanvas.height = traceCanvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

// === FIELD ===
const field = {
  energy: 0.5,
  warmth: 0.5,
  rotation: 0,
  flowX: 0,
  flowY: 0,
  cohesion: 0.5,
  pulse: 0,
};

const fieldTarget = {
  energy: 0.5,
  warmth: 0.5,
  rotation: 0,
  flowX: 0,
  flowY: 0,
  cohesion: 0.5,
  pulse: 0,
};

function lerpField(dt) {
  const keys = Object.keys(field);
  for (const k of keys) {
    field[k] += (fieldTarget[k] - field[k]) * 0.0005 * dt;
  }
}

// Entropy source: mix performance.now() into every random decision
// so no two moments in time can produce the same sequence (spec: 永不重複)
function entropy() {
  const t = performance.now();
  const s = Math.sin(t * 12345.6789 + t * t * 0.001) * 0.5 + 0.5;
  return (Math.random() + s) % 1;
}

function randomizeFieldTarget() {
  fieldTarget.energy = entropy();
  fieldTarget.warmth = entropy();
  fieldTarget.rotation = (entropy() - 0.5) * 2;
  fieldTarget.flowX = (entropy() - 0.5) * 2;
  fieldTarget.flowY = (entropy() - 0.5) * 2;
  fieldTarget.cohesion = entropy();
  fieldTarget.pulse = entropy();
}

// === AGENTS 眾生 ===
const NUM_AGENTS = 200;
const agents = [];
for (let i = 0; i < NUM_AGENTS; i++) {
  agents.push({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    vx: 0,
    vy: 0,
    size: 1 + Math.random() * 2,
    phase: Math.random() * Math.PI * 2,
  });
}

// === MAIN LOOP ===
let lastTime = performance.now();

function loop(t) {
  const dt = t - lastTime;
  lastTime = t;

  lerpField(dt);

  ctx.clearRect(0, 0, W, H);

  for (const a of agents) {
    ctx.beginPath();
    ctx.arc(a.x, a.y, a.size, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180, 180, 200, 0.6)';
    ctx.fill();
  }

  // Temporary debug
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '11px monospace';
  const keys = Object.keys(field);
  for (let i = 0; i < keys.length; i++) {
    ctx.fillText(`${keys[i]}: ${field[keys[i]].toFixed(3)}`, 10, 20 + i * 14);
  }

  requestAnimationFrame(loop);
}

setInterval(() => randomizeFieldTarget(), 5000);
requestAnimationFrame(loop);
</script>
</body>
</html>
