<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>緣</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; cursor: none; }
canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
#substrate { z-index: -1; }
#trace { z-index: 0; }
#core  { z-index: 1; }
#main  { z-index: 2; }
</style>
</head>
<body>
<canvas id="trace"></canvas>
<canvas id="core"></canvas>
<canvas id="main"></canvas>
<script>
// ============================================================
//  緣 v4 — 生成式法像
//  Generative thangka-inspired artwork
//  Three concentric layers: core grid / active band / void edge
// ============================================================

// === CANVAS SETUP ===
const traceCanvas = document.getElementById('trace');
const coreCanvas  = document.getElementById('core');
const mainCanvas  = document.getElementById('main');
const traceCtx = traceCanvas.getContext('2d');
const coreCtx  = coreCanvas.getContext('2d');
const ctx      = mainCanvas.getContext('2d');
let W, H, CX, CY, R, dpr;

// [Opt] DPR safety cap. Per-frame fill cost scales with backing-store pixels = W·H·dpr².
// A true-4K projector reports dpr=1 (this is a no-op there — already as lean as DPR allows).
// Its job is to stop a HiDPI / OS-scaled display from silently 4×-inflating the backing
// store (up to ~33M px) and tanking the 60fps budget. Faint line art tolerates mild
// softening far better than dropped frames. Drop to 1.0 to force native-only on the
// exhibition machine; raise for a crisper desktop preview.
const MAX_DPR = 1.5;

function resize() {
  // [Fix #2] Handle devicePixelRatio: canvas dimensions x dpr, CSS unchanged
  dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);
  W = innerWidth;
  H = innerHeight;
  const cw = W * dpr;
  const ch = H * dpr;
  for (const c of [traceCanvas, coreCanvas, mainCanvas]) {
    c.width = cw;
    c.height = ch;
  }
  // P0-5: reset transform before scaling to prevent accumulation across resizes
  traceCtx.setTransform(1,0,0,1,0,0); traceCtx.scale(dpr, dpr);
  coreCtx.setTransform(1,0,0,1,0,0);  coreCtx.scale(dpr, dpr);
  ctx.setTransform(1,0,0,1,0,0);      ctx.scale(dpr, dpr);

  CX = W / 2;
  CY = H / 2;
  R = Math.min(W, H) * 0.45;

  // [Fix #1] Guard drawCoreGrid call
  if (typeof drawCoreGrid === 'function') drawCoreGrid();
  // FAUX-BLOOM: glow buffer + coreGlow must follow W/H/R/CX/CY. resizeBloom
  // has an internal "size unchanged → no realloc" guard, so repeated resizes
  // never new a canvas. Guarded so first resize() (before initBloom) is a no-op.
  if (typeof resizeBloom === 'function' && BLOOM.enabled && gBuf) resizeBloom();
  // SUBSTRATE: re-tile on size change. bakeSubstrate has a same-size guard (like
  // resizeBloom), so repeated/identical resizes never re-bake. dpr-agnostic (CSS-size backing).
  if (typeof bakeSubstrate === 'function' && SUBSTRATE.enabled && substrateCanvas) bakeSubstrate();
}
addEventListener('resize', resize);

// === ENTROPY ===
// [Fix #5] Better distribution: average of two uniform randoms
function entropy() {
  return (Math.random() + Math.random()) * 0.5;
}

// === PALETTE ===
const PALETTE = {
  deepBlue:  { h: 220, s: 75, l: 35 },
  vermilion: { h: 5,   s: 80, l: 45 },
  emerald:   { h: 155, s: 65, l: 30 },
  gold:      { h: 42,  s: 80, l: 48 },
  purple:    { h: 280, s: 60, l: 25 },
  warmWhite: { h: 40,  s: 30, l: 85 },
};

const PAIRS = [
  ['gold', 'deepBlue'],
  ['vermilion', 'emerald'],
  ['warmWhite', 'purple'],
  ['gold', 'vermilion'],
];

// ============================================================
//  礦物顏料老化漂移 (維度三:色彩真實度 — 藍→綠 weathering)
//  詩學非物理 (研究 §3C/§8#5):azurite 族在展期尺度極慢往綠移 +
//  略降飽和。連顏料都被緣起、無常 —— 騎在既有 macro-time / rebirth 上。
//  純色彩解析層:只改「某 key 解析成什麼 hue」,不碰「選哪個 key」。
//  狀態獨立(不碰 field/macro);真空(真空=重生)時 age 煥新歸零。
// ============================================================
const PIGMENT = {
  enabled: true,       // 總開關。false → hsl() 走原樣,零漂移、零成本。
  // --- 速率(單向老化)---
  // age 0→1 的時間 ≈ 1 / RATE 毫秒。預設 ~25 分鐘到「最老」。
  // 展演尺度可調更慢(數小時/數天):見 tunables。
  RATE: 1 / (25 * 60 * 1000),   // per-ms,作用於 dt
  // --- 天花板(最老時的偏移上限,age=1 時生效)---
  HUE_CEIL: -24,       // 色相最大位移(度)。負=往綠(azurite→malachite 方向)。
  SAT_CEIL: -12,       // 飽和最大位移(百分點)。負=略褪。
  // L 不動:不抬黑、保 faint。
  // --- 真空煥新 ---
  // true-emptiness(真空=重生)期間,age 以此速率朝 0 衰退 = 顏料煥新。
  // 比老化快(空是「重置」不是「慢慢變回去」),但仍平滑、不跳變。
  REJUV_RATE: 1 / (8 * 1000),    // ~8s 真空內幾乎歸零
  // --- 每個 PALETTE key 對 azurite 老化的「易感度」權重 [0..1] ---
  // 你劃的邊界:deepBlue 主角;冷族 emerald/purple 輕觸;暖族穩定;gold 不漂。
  W: {
    deepBlue:  1.00,   // azurite:主角
    emerald:   0.35,   // 冷族:sympathetic 微移(本就偏綠,只加深)
    purple:    0.45,   // 冷族:violet 略往藍冷移
    gold:      0.00,   // 金=永恆/神聖:不照 azurite 老化(見 GOLD_PATINA)
    vermilion: 0.00,   // 暖族:穩定
    warmWhite: 0.00,   // 暖族:穩定
  },
  // --- 金的「極輕暖 patina」(獨立於 azurite 漂移)---
  // 金不變綠;預設近零。要的話給一點點往琥珀的暖(正 hue 往 amber、微降 hue)。
  GOLD_PATINA: { dh: 0, ds: 0 },   // 預設 0 = 金完全不老。要試:{ dh:-2, ds:-1 }
};

// 漂移狀態:獨立純量,dt 推進。像 macroPhase 但不碰 updateMacro。
let pigmentAge = 0;   // [0..1];0=新顏料,1=最老。force-age 改它即可(見 tunables)。

// 每幀推進。放 loop 既有 updateColorMaturity(dt) 旁。
// 只讀 isTrueEmptiness(真空旗標),不改其邏輯。
function updatePigment(dt) {
  if (!PIGMENT.enabled) return;
  if (isTrueEmptiness && breathState === BREATH.SILENCE) {
    // 真空=重生:顏料煥新,age 平滑朝 0。
    pigmentAge -= dt * PIGMENT.REJUV_RATE;
    if (pigmentAge < 0) pigmentAge = 0;
  } else {
    // 平時:極慢單向老化,封頂 1(不會無限漂爆)。
    if (pigmentAge < 1) {
      pigmentAge += dt * PIGMENT.RATE;
      if (pigmentAge > 1) pigmentAge = 1;
    }
  }
}

// hsl():唯一色彩解析 chokepoint。簽名不變、call site 零改。
// 在這裡把 PALETTE 的 h/s 套上老化 offset;PALETTE 物件本身只讀、不被改。
function hsl(color, alpha) {
  const c = PALETTE[color];
  if (!PIGMENT.enabled || pigmentAge <= 0) {
    return `hsla(${c.h}, ${c.s}%, ${c.l}%, ${alpha})`;   // 原樣快路徑
  }
  let h = c.h, s = c.s;
  const w = PIGMENT.W[color];        // 未列的 key → undefined → 不漂
  if (w) {
    h += PIGMENT.HUE_CEIL * w * pigmentAge;   // 往綠
    s += PIGMENT.SAT_CEIL * w * pigmentAge;   // 略褪
    if (s < 0) s = 0;
  } else if (color === 'gold') {
    // 金:不照 azurite 漂,只極輕暖 patina(預設 0)。
    h += PIGMENT.GOLD_PATINA.dh * pigmentAge;
    s += PIGMENT.GOLD_PATINA.ds * pigmentAge;
    if (s < 0) s = 0;
  }
  // L 不碰:保 faint、不抬黑。
  return `hsla(${h}, ${s}%, ${c.l}%, ${alpha})`;
}

// [Fix #9] Color pair selection: collect all pairs containing primary,
// choose based on field state (gold+vermilion when energy>0.8 && warmth>0.7)
function fieldPrimaryColor() {
  // P0-1: warm colors locked until colorMaturity > 0.6
  if (field.energy > 0.6) {
    if (derived.warmth > 0.6 && isWarmColorUnlocked()) return 'vermilion';
    return 'gold';
  }
  if (field.order > 0.6) return 'gold';
  if (field.energy < 0.3) return field.order > 0.5 ? 'deepBlue' : 'purple';
  return 'deepBlue';
}

function fieldSecondaryColor() {
  const primary = fieldPrimaryColor();
  // Collect all pairs that contain primary
  const matching = PAIRS.filter(p => p.includes(primary));
  if (matching.length === 0) return 'deepBlue';

  // [Fix #9] Special rare pair: gold+vermilion at peak energy+warmth
  if (field.energy > 0.8 && derived.warmth > 0.7) {
    const rarePair = matching.find(p => p.includes('gold') && p.includes('vermilion'));
    if (rarePair) return rarePair.find(c => c !== primary);
  }

  // Otherwise pick based on field state hash
  const idx = Math.floor(field.energy * 17 + field.order * 13) % matching.length;
  return matching[idx].find(c => c !== primary) || 'deepBlue';
}

// [Fix #10] colorMaturity growth rate: dt * 0.000012 (~83s to reach 1)
// P0-1: colorMaturity starts at 0.3 (visible from the start), controls color selection not alpha
let colorMaturity = 0.3;
function updateColorMaturity(dt) {
  if (colorMaturity < 1) colorMaturity = Math.min(1, colorMaturity + dt * 0.000012);
}
// Before maturity reaches ~0.6 (~25s), only cool colors + gold. After that, warm colors unlock.
function isWarmColorUnlocked() { return colorMaturity > 0.6; }

// === FIELD ===
const field = { energy: 0.3, order: 0.5 };
const fieldTarget = { energy: 0.3, order: 0.5 };
// P2-14: only warmth is used by rendering; rotation/flow/pulse removed as dead code
const derived = { warmth: 0.5 };

function deriveParams() {
  derived.warmth = field.energy * 0.6 + (1 - field.order) * 0.4;
}

// [Fix #4] lerpField acceleration: increase quadratic coefficient to 0.02
function lerpField(dt) {
  const de = fieldTarget.energy - field.energy;
  const dor = fieldTarget.order - field.order;
  const dist = Math.sqrt(de * de + dor * dor);
  const baseRate = 0.0003 + dist * dist * 0.005;
  let tempoScale = 1.0;
  if (currentEra === ERA.STORM) tempoScale = 3.0;
  else if (currentEra === ERA.DRIFT) tempoScale = 0.5;
  else if (currentEra === ERA.SPARSE) tempoScale = 0.7;
  const rate = baseRate * tempoScale * dt;
  field.energy += de * rate;
  field.order += dor * rate;
}

function chooseNextTarget() {
  const isJump = Math.random() < 0.3;
  const range = isJump ? 0.8 : 0.3;

  let eMin = 0, eMax = 1, oMin = 0, oMax = 1;
  if (abundance < 0.3) {
    eMax = 0.5;
    if (Math.random() < 0.6) { oMax = 0.35; } else { oMin = 0.65; }
  } else if (abundance > 0.7) {
    eMin = 0.3; oMin = 0.3;
  }

  let ne = field.energy + (Math.random() - 0.5) * 2 * range;
  let no = field.order + (Math.random() - 0.5) * 2 * range;
  ne = Math.max(eMin, Math.min(eMax, ne));
  no = Math.max(oMin, Math.min(oMax, no));
  if (Math.abs(ne - fieldTarget.energy) < 0.05 && Math.abs(no - fieldTarget.order) < 0.05) {
    ne = eMin + Math.random() * (eMax - eMin);
    no = oMin + Math.random() * (oMax - oMin);
  }
  fieldTarget.energy = ne;
  fieldTarget.order = no;
  deriveParams();
}

// === MACRO ===
let abundance = 0.5;
let abundanceTarget = 0; // now used as perturbation offset, not target
let macroTimer = 0;
let macroInterval = 60000 + entropy() * 120000;

// === ERA SYSTEM (世代) ===
const ERA = { BLOOM: 0, SPARSE: 1, STORM: 2, DRIFT: 3 };
let currentEra = ERA.BLOOM;
let prevEra = ERA.BLOOM;

// Macro arc phases (dual sine)
let macroPhase1 = Math.random() * Math.PI * 2;
let macroPhase2 = Math.random() * Math.PI * 2;

// LIVING internal dynamics
let midlifeShiftDone = false;
let midlifeShiftPoint = 0;
let livingBreathBase = 1.0;
let livingBreathAmp = 0;
let isReborn = false;

function updateMacro(dt) {
  macroPhase1 += dt * 0.000021;   // ~5 min cycle
  macroPhase2 += dt * 0.0000052;  // ~20 min cycle
  let base = 0.5 + 0.3 * Math.sin(macroPhase1) + 0.2 * Math.sin(macroPhase2);
  macroTimer += dt;
  if (macroTimer > macroInterval) {
    abundanceTarget = (Math.random() - 0.5) * 0.15;
    macroTimer = 0;
    macroInterval = 30000 + entropy() * 60000;
  }
  // B6: decay perturbation smoothly back toward zero
  abundanceTarget *= (1 - 0.00001 * dt);
  abundance = Math.max(0.05, Math.min(0.95, base + abundanceTarget));
}

// === THANGKA LINE QUALITY ===
// Three principles from master Tenzin Norbu:
// 1. Breathing micro-variation: 2-3% lineWidth sine wave along path
// 2. Embedded edges: 0.5px fusion with adjacent color
// 3. Angle-dependent gold tone

// ============================================================
//  SANDSTROKE 顆粒筆觸 (維度一 #1 質感)
//  把 strokeThangka 的主描邊從連續向量線 → 沿路徑沉積的顆粒。
//  純 2D、零相依。primitive = fillRect 小方塊(實測比 arc 快 8.6×)。
//  全部實測驗證:peak 58 元素整場 grains 0.2ms avg / 0.9ms max;
//  faintnessGuard 實測沉積亮度 ≈ 原描邊 0.53–0.85×(永不變亮)。
// ============================================================

// --- 可調參數(集中,方便現場微調)---
const SAND = {
  spacing:      2.0,   // 沿脊線顆粒間距(px)。越小越濃。實測 2.2→亮度0.53×;2.0 目標 ~0.7×
  spacingMin:   2.0,   // 降級時 spacing 不會比這更密
  spacingMax:   4.2,   // 降級時 spacing 上限(越稀疏越省)
  sigmaScale:   0.5,   // 法線(橫向)抖動 = baseWidth * sigmaScale
  alongScale:   0.45,  // 沿脊線抖動 = spacing * alongScale
  grainAlpha:   0.85,  // per-grain alpha = (原描邊 alpha) * grainAlpha,並 clamp 上限
  grainAlphaCap:0.55,  // per-grain alpha 硬上限(防單顆過濃)
  sizeThin:     1.0,   // baseWidth < 1.2 的方塊邊長(px)
  sizeThick:    1.2,   // 否則方塊邊長(px)
  fadeFloor:    0.5,   // strokeAlpha 低於此值開始線性減顆粒(趨近空)
  frameBudget:  6000,  // 每幀顆粒總數硬上限。perf 審查實測:energy=order=1、50 patterns 全滿時真實 peak 會打到 4200 cap(原註解「max 2572 含 headroom」為誤)→ 上調至 6000 覆蓋真實 peak,消除外圈 pattern 飢餓閃爍。實測成本 ~2.5ms/frame,仍遠低於 16.7ms。
};

// 每幀顆粒預算(loop 開頭歸零)。模組級,避免每幀配置。
let sandBudgetLeft = SAND.frameBudget;

// 專用 RNG:不污染、不依賴 entropy()/Math.random 的視覺一致性。
// 每幀以 frame seed 重置,讓同一路徑在連續幀的顆粒「站著呼吸」而非每幀亂跳重灑。
let _sandSeed = 0x2f6e2b1;
function sandReseed(s) { _sandSeed = (s | 0) || 0x2f6e2b1; }
function sandRnd() {
  // xorshift32:快、夠亂
  let x = _sandSeed;
  x ^= x << 13; x ^= x >>> 17; x ^= x << 5;
  _sandSeed = x;
  return ((x >>> 0) / 4294967296);
}
// 近高斯抖動(三 uniform 平均),回傳大致 [-1,1] 的鐘形
function sandJitter() { return (sandRnd() + sandRnd() + sandRnd() - 1.5) * 0.9; }

// 從 'hsla(H, S%, L%, A)' 拆出 'H, S%, L%' 與 A(用來繼承顏色、丟棄 bake alpha)。
// 容錯:傳入 'hsl(...)' 或非預期字串時 baseA=1、head 原樣。
function sandSplitColor(str) {
  const m = /^hsla?\(([^)]+)\)/.exec(str);
  if (!m) return { head: str, baseA: 1 };
  const p = m[1].split(',');
  return { head: p.slice(0, 3).join(','), baseA: p.length >= 4 ? parseFloat(p[3]) : 1 };
}

// 全片元素多時的降級:把基準 spacing 依「目前活著的元素數」線性拉稀。
// bgPatterns(≤50) + beingPatterns(≤8) ≈ 58 為 peak。元素少時用最濃 spacingMin,
// 接近 peak 時放寬到 spacingMax,從源頭壓低顆粒總數(在 budget 之前先軟著陸)。
function sandSpacingFor(baseWidth) {
  const load = (bgPatterns.length + beingPatterns.length) / 50; // 0..~1.16
  const t = Math.max(0, Math.min(1, load));
  const dyn = SAND.spacingMin + (SAND.spacingMax - SAND.spacingMin) * t * t; // 二次:只在很滿時才明顯拉稀
  // baseWidth 越粗,顆粒可略疏(粗線本就視覺重);越細越密以維持可見度
  return Math.max(dyn, baseWidth * 1.3);
}

// === 核心:沿 pathPoints 沉積顆粒 ===
// 簽名與 strokeThangka 對齊,額外吃 ctx(主圖層固定為 ctx,但保持顯式以便日後複用)。
// 回傳實際灑出的顆粒數(供 budget 扣減 / 監看)。
function sandstroke(c, pts, baseWidth, color, strokeAlpha) {
  if (pts.length < 2 || strokeAlpha < 0.01) return 0;
  if (sandBudgetLeft <= 0) return 0;

  // faintnessGuard ①:傳入 alpha 低 → 線性減顆粒(densityScale),趨近空。
  const densityScale = strokeAlpha >= SAND.fadeFloor ? 1 : (strokeAlpha / SAND.fadeFloor);

  const { head, baseA } = sandSplitColor(color);
  // faintnessGuard ②:per-grain alpha 由原描邊 alpha 推導,並 clamp,確保沉積總量 ≤ 原線。
  const grainA = Math.min(baseA * SAND.grainAlpha, SAND.grainAlphaCap);
  if (grainA < 0.004) return 0;

  const spacing = sandSpacingFor(baseWidth);
  const sigma   = baseWidth * SAND.sigmaScale;
  const along   = spacing * SAND.alongScale;
  const size    = baseWidth < 1.2 ? SAND.sizeThin : SAND.sizeThick;
  const half    = size * 0.5;

  // fillStyle 每路徑只設一次(實測 per-grain 改字串成本翻倍)
  c.fillStyle = 'hsla(' + head + ',' + grainA.toFixed(3) + ')';

  let emitted = 0;
  // carry:跨 segment 累積的「下一顆距離」,讓顆粒沿整條路徑等弧長分佈(非每段重置)
  let carry = sandRnd() * spacing;

  for (let i = 1; i < pts.length; i++) {
    const ax = pts[i - 1].x, ay = pts[i - 1].y;
    let dx = pts[i].x - ax, dy = pts[i].y - ay;
    const segLen = Math.sqrt(dx * dx + dy * dy);
    if (segLen < 1e-4) continue;
    const inv = 1 / segLen;
    dx *= inv; dy *= inv;
    const nx = -dy, ny = dx; // 單位法線

    let d = carry;
    while (d < segLen) {
      // 降級/淡化抽稀:densityScale<1 時機率性跳過
      if (densityScale < 1 && sandRnd() > densityScale) { d += spacing; continue; }
      // budget 用罄:停。carry 結算讓下次(若有)銜接,但通常整幀就此打住。
      if (sandBudgetLeft <= 0) { return emitted; }

      const t   = d + sandJitter() * along;       // 沿脊線抖動
      const off = sandJitter() * sigma;           // 橫向(法線)抖動
      const px  = ax + dx * t + nx * off;
      const py  = ay + dy * t + ny * off;
      c.fillRect(px - half, py - half, size, size);

      emitted++; sandBudgetLeft--;
      d += spacing;
    }
    carry = d - segLen;
  }
  return emitted;
}

// === 改寫後的 strokeThangka ===
// 保留 embed 底層(唐卡嵌邊原則 + 顆粒的著落底);主描邊 → sandstroke 顆粒。
// 簽名完全不變,所有現有 call site 不需改。
function strokeThangka(pathPoints, baseWidth, color, alpha, embedColor) {
  if (pathPoints.length < 2 || alpha < 0.005) return;

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // 原則二:嵌邊 — 較寬、較暗的底層(保留,quadraticCurveTo 平滑)
  if (embedColor) {
    ctx.lineWidth = baseWidth + 0.5;
    ctx.strokeStyle = embedColor;
    ctx.beginPath();
    ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
    for (let i = 1; i < pathPoints.length; i++) {
      if (i < pathPoints.length - 1) {
        const mx = (pathPoints[i].x + pathPoints[i + 1].x) / 2;
        const my = (pathPoints[i].y + pathPoints[i + 1].y) / 2;
        ctx.quadraticCurveTo(pathPoints[i].x, pathPoints[i].y, mx, my);
      } else {
        ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
      }
    }
    ctx.stroke();
  }

  // 原則一(取代版):主描邊 = 沉積顆粒,而非 breathing 等寬線。
  sandstroke(ctx, pathPoints, baseWidth, color, alpha);
}

// Principle 3: Gold with angle-dependent tone
// Returns an hsla string for gold that shifts warm↔bright based on line direction angle
function goldTone(angle, alpha) {
  // angle: direction of the line segment in radians
  // Horizontal → warm gold (h:45, s:85, l:50)
  // Vertical → bright gold (h:48, s:80, l:65)
  const verticalness = Math.abs(Math.sin(angle));
  // P1-7: warm gold base (42,80,48), vertical shift +10% lightness not +15%
  const h = 42 + verticalness * 4;
  const s = 80 - verticalness * 5;
  const l = 48 + verticalness * 10;
  return `hsla(${h}, ${s}%, ${l}%, ${alpha})`;
}

// Collect points along a Canvas arc for strokeThangka
function arcToPoints(cx, cy, r, startAngle, endAngle, steps) {
  const pts = [];
  const range = endAngle - startAngle;
  // P2-13: cap at 24 steps to avoid excessive points on large radii
  const n = steps || Math.min(24, Math.max(8, Math.floor(Math.abs(range) * r / 10)));
  for (let i = 0; i <= n; i++) {
    const a = startAngle + (i / n) * range;
    pts.push({ x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r });
  }
  return pts;
}

// === CORE GRID ===
function drawCoreGrid() {
  coreCtx.save();
  coreCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  coreCtx.clearRect(0, 0, W, H);
  coreCtx.lineWidth = 0.5;
  coreCtx.lineCap = 'round';

  // Concentric circles — use angle-dependent gold tone
  let cr = R * 0.05;
  while (cr < R) {
    // Draw circle as segments with angle-dependent gold
    const segs = 32;
    for (let i = 0; i < segs; i++) {
      const a1 = (i / segs) * Math.PI * 2;
      const a2 = ((i + 1) / segs) * Math.PI * 2;
      const midAngle = (a1 + a2) / 2;
      coreCtx.strokeStyle = goldTone(midAngle, 0.1);
      coreCtx.beginPath();
      coreCtx.arc(CX, CY, cr, a1, a2);
      coreCtx.stroke();
    }
    cr *= 1.5;
  }

  // Radial lines (16-fold) — each spoke with angle-dependent gold
  const spokes = 16;
  for (let i = 0; i < spokes; i++) {
    const angle = (i / spokes) * Math.PI * 2;
    coreCtx.strokeStyle = goldTone(angle, 0.1);
    coreCtx.beginPath();
    coreCtx.moveTo(CX, CY);
    coreCtx.lineTo(CX + Math.cos(angle) * R * 0.95, CY + Math.sin(angle) * R * 0.95); // P2-17
    coreCtx.stroke();
  }

  // Cross axes (slightly brighter, angle-dependent)
  coreCtx.lineWidth = 0.7;
  coreCtx.strokeStyle = goldTone(0, 0.14); // horizontal
  coreCtx.beginPath();
  coreCtx.moveTo(CX - R * 0.95, CY); coreCtx.lineTo(CX + R * 0.95, CY); // P2-17
  coreCtx.stroke();
  coreCtx.strokeStyle = goldTone(Math.PI / 2, 0.14);
  coreCtx.beginPath();
  coreCtx.moveTo(CX, CY - R * 0.95); coreCtx.lineTo(CX, CY + R * 0.95); // P2-17
  coreCtx.stroke();

  // [Fix #7] Non-uniform proportion arcs (1:2:3:5 ratio based) to hint at body structure
  coreCtx.strokeStyle = hsl('gold', 0.07);
  coreCtx.lineWidth = 0.4;
  const ratios = [1, 2, 3, 5];
  const totalRatio = ratios.reduce((a, b) => a + b, 0);
  let cumulative = 0;
  for (const ratio of ratios) {
    cumulative += ratio;
    const ar = R * (cumulative / totalRatio) * 0.75;
    // Quarter arcs at cardinal points with non-uniform spans
    for (let q = 0; q < 4; q++) {
      const startAngle = (q / 4) * Math.PI * 2 - Math.PI / 8;
      const span = (Math.PI / 4) * (ratio / 3); // non-uniform arc spans
      coreCtx.beginPath();
      coreCtx.arc(CX, CY, ar, startAngle, startAngle + span);
      coreCtx.stroke();
    }
  }
  drawMandalaSkeleton();   // ← 新增:壇城骨架升級(在既有 grid 之後、同一 save/restore 內)
  coreCtx.restore();
  // FAUX-BLOOM: core skeleton repainted → its warm-gold glow cache is stale.
  // bakeCoreGlow is lazy (buildBloom rebakes only when this flag is set).
  coreGlowDirty = true;
}

// ============================================================
//  壇城骨架升級 (維度二:法像真實性)
//  方形宮殿 corner-brackets + n 重旋轉對稱星形母題。
//  Zhang & Zhang《Parametric Modeling ... Mandala Thangka》§2A。
//  純幾何、用既有 goldTone、加進 drawCoreGrid(只在 resize 畫一次)。
//  ★ RESTRAINT:faint + incomplete + 可在真空隨 core 層退場。
//  概念專家鐵律:暗示神聖結構,不可畫成完整裝飾性曼陀羅。
// ============================================================

// --- 可調旋鈕(集中,現場/微調用)---
const MANDALA = {
  enabled:        true,   // ← 一鍵關掉「整個壇城骨架升級」層(回到原 grid)

  // 星形母題(n 重旋轉對稱:n 個內接等腰三角,尖朝外、底以連接弧相接)
  starEnabled:    true,
  starRings:      1,      // 畫幾「圈」星(每圈一個 n、一組半徑)。1=最克制;>1 漸吵
  starN:          [8],    // 各圈的 n(尖角數)。預設 8;可給 [4]、[8] 或多圈 [8,16]
                          //   16 故意不設預設——畫滿 16 會逼近完整曼陀羅(背叛 austerity)
  starKeep:       0.58,   // incomplete:保留多少比例的尖角(0.58→n=8 時留 5 角)。1=完整(別)
  starTipR:       [0.45], // 各圈尖端半徑(相對 R)。挑在既有同心圓「之間」避免疊線
  starBaseR:      [0.30], // 各圈基底半徑(相對 R)。tipR>baseR(尖朝外)
  starBaseFrac:   0.82,   // 基底角寬 = (2π/n)*starBaseFrac;~0.82→相鄰底幾乎相接但留縫
  starAlpha:      0.07,   // ≤ 既有 grid。再被 coreCanvas 呼吸 opacity 二次壓暗
  starConnect:    true,   // 相鄰「都存在」的尖角之間,沿 baseR 畫淺連接弧(壇城蓮座感)
  starConnectA:   0.05,   // 連接弧 alpha(更淡)

  // 方形宮殿(rotated square 的「角」,套在同心圓內;只畫角括號,永不連成整邊)
  palaceEnabled:  true,
  palaceRings:    1,      // 畫幾圈宮殿。1=最克制
  palaceR:        [0.40], // 各圈宮殿外接半徑(相對 R)。方形四角落在此半徑
  palaceRot:      [0.7854],// 各圈旋轉(rad)。π/4 → 角朝對角線,與正交十字/輻射錯開
  palaceKeep:     0.78,   // incomplete:保留多少比例的角(0.78→4 角留 3,掉一角)
  palaceBracket:  0.26,   // 角括號沿每條邊延伸的比例(0.26→只佔邊長 1/4,讀作「角」)
  palaceAlpha:    0.06,   // ≤ 既有 grid,且比星形更淡(宮殿是更安靜的底層暗示)

  bakeGlow:       false,  // ← 預設 false:新幾何夠淡、不需 bloom 的暖金 halo(見 risks/glow)
                          //   設 true 才把宮殿環納入 bakeCoreGlow(仍 faint)。星形永不入 glow
};

// 確定性「這個位置畫不畫」決定子:黃金比低差異序列。
// 為何不用 Math.random:靜態繪製(resize 才跑)要可重現、且不污染 entropy/sand RNG 的視覺。
// 黃金比序列散佈極均勻 → gap 不群聚,壞掉的對稱「均勻地不完整」而非一坨缺一塊。
function mandalaPresent(i, keepFrac) {
  if (keepFrac >= 1) return true;
  if (keepFrac <= 0) return false;
  return ((i * 0.6180339887498949) % 1) < keepFrac;
}

// === 星形母題:一圈 n 重旋轉對稱等腰三角(尖朝外,底以連接弧相接,且 incomplete)===
// 畫在 coreCtx(已 setTransform(dpr) 過)。用 goldTone 維持角度相關金色一致性。
function drawStarMotif(ring) {
  const n      = MANDALA.starN[ring] || MANDALA.starN[0] || 8;
  const tipR   = R * (MANDALA.starTipR[ring]  ?? MANDALA.starTipR[0]  ?? 0.45);
  const baseR  = R * (MANDALA.starBaseR[ring] ?? MANDALA.starBaseR[0] ?? 0.30);
  const half   = (Math.PI * 2 / n) * MANDALA.starBaseFrac * 0.5; // 基底半角
  const TAU    = Math.PI * 2;

  // 先算每個尖角的「存在與否」,連接弧才知道相鄰是否都在
  const presentArr = new Array(n);
  for (let k = 0; k < n; k++) presentArr[k] = mandalaPresent(k, MANDALA.starKeep);

  coreCtx.lineWidth = 0.5;
  for (let k = 0; k < n; k++) {
    if (!presentArr[k]) continue;
    const a   = k * TAU / n;                    // 尖角所在方位(無 phase:對齊輻射骨架)
    const tip = { x: CX + Math.cos(a) * tipR,       y: CY + Math.sin(a) * tipR };
    const bL  = { x: CX + Math.cos(a - half) * baseR, y: CY + Math.sin(a - half) * baseR };
    const bR  = { x: CX + Math.cos(a + half) * baseR, y: CY + Math.sin(a + half) * baseR };
    // 等腰三角的兩斜邊(底邊由連接弧代勞;不畫底邊本身→更輕、更「壇座」)
    // 用 goldTone(以三角朝向 a 取色)維持與既有 grid 同一金色語彙
    coreCtx.strokeStyle = goldTone(a, MANDALA.starAlpha);
    coreCtx.beginPath();
    coreCtx.moveTo(bL.x, bL.y);
    coreCtx.lineTo(tip.x, tip.y);
    coreCtx.lineTo(bR.x, bR.y);
    coreCtx.stroke();
  }

  // 基底連接弧:沿 baseR,連「相鄰兩尖角都存在」者的相鄰底角。淺弧,壇城蓮座/連續性暗示。
  if (MANDALA.starConnect) {
    coreCtx.lineWidth = 0.4;
    for (let k = 0; k < n; k++) {
      const kNext = (k + 1) % n;
      if (!presentArr[k] || !presentArr[kNext]) continue;   // 任一缺 → 留缺口(incomplete)
      const aR = k * TAU / n + half;          // 本三角的右底角
      const aL = kNext * TAU / n - half;       // 下一三角的左底角
      // 跨越 k→k+1 接縫時 aL 可能 < aR;arc 用實際角度,範圍很小(底幾乎相接)
      const mid = (k + 0.5) * TAU / n;
      coreCtx.strokeStyle = goldTone(mid, MANDALA.starConnectA);
      coreCtx.beginPath();
      coreCtx.arc(CX, CY, baseR, aR, aL + (aL < aR ? TAU : 0));
      coreCtx.stroke();
    }
  }
}

// === 方形宮殿:rotated square 的「角括號」(只畫角,永不連成整邊;且 incomplete)===
function drawPalace(ring) {
  const pr  = R * (MANDALA.palaceR[ring]   ?? MANDALA.palaceR[0]   ?? 0.40);
  const rot = (MANDALA.palaceRot[ring] ?? MANDALA.palaceRot[0] ?? Math.PI / 4);
  const frac = MANDALA.palaceBracket;

  coreCtx.lineWidth = 0.5;
  for (let i = 0; i < 4; i++) {
    if (!mandalaPresent(i, MANDALA.palaceKeep)) continue;  // 掉角 → incomplete
    const aC = rot + i * Math.PI / 2;            // 本角方位
    const aN = rot + (i + 1) * Math.PI / 2;      // 下一角
    const aP = rot + (i - 1) * Math.PI / 2;      // 上一角
    const c  = { x: CX + Math.cos(aC) * pr, y: CY + Math.sin(aC) * pr };
    const nx = { x: CX + Math.cos(aN) * pr, y: CY + Math.sin(aN) * pr };
    const pv = { x: CX + Math.cos(aP) * pr, y: CY + Math.sin(aP) * pr };
    // 角括號:從角往兩鄰角各走 frac(直線弦,非弧)→ 銳利「方形」感,與圓形母題對比
    const toN = { x: c.x + (nx.x - c.x) * frac, y: c.y + (nx.y - c.y) * frac };
    const toP = { x: c.x + (pv.x - c.x) * frac, y: c.y + (pv.y - c.y) * frac };
    coreCtx.strokeStyle = goldTone(aC, MANDALA.palaceAlpha);  // goldTone 維持一致金色
    coreCtx.beginPath();
    coreCtx.moveTo(toP.x, toP.y);
    coreCtx.lineTo(c.x, c.y);
    coreCtx.lineTo(toN.x, toN.y);
    coreCtx.stroke();
  }
}

// === 入口:由 drawCoreGrid 在既有層之後呼叫一次 ===
function drawMandalaSkeleton() {
  if (!MANDALA.enabled) return;
  coreCtx.lineCap = 'round';
  coreCtx.lineJoin = 'round';
  if (MANDALA.palaceEnabled) {
    for (let r = 0; r < MANDALA.palaceRings; r++) drawPalace(r);
  }
  if (MANDALA.starEnabled) {
    for (let r = 0; r < MANDALA.starRings; r++) drawStarMotif(r);
  }
}

// [Fix #8] Core breath CSS: 0.5 + sin * 0.35
// P2-16: non-symmetric breathing — inhale faster, exhale slower, plateau at bottom
// P2-21: redraw core grid at low frequency instead of CSS opacity (avoids compositing cost)
let coreBreathPhase = 0;
let coreRedrawTimer = 0;
// 真空-purity gate 狀態(繪製層,只讀 isTrueEmptiness/breathState,不改靈魂):
//   coreAppliedOpacity = 目前實際寫到 canvas 的 opacity(供平滑 fade-out + 乾淨 restore)。
//   coreVoidGating     = 上一幀是否處於真空收斂;用來偵測「真空→重生」的 restore edge。
// 初始 0.5 = 既有 breath 中段,避免首幀與 init 不一致。
let coreAppliedOpacity = 0.5;
let coreVoidGating = false;
let coreWrittenOpacity = '';                   // 上次寫入 #core 的 opacity 字串
// write-on-change:只在值改變時寫 DOM → 真空收斂到 "0.000" 後不再無謂逐幀寫。
function setCoreOpacity(v) {
  const s = v.toFixed(3);
  if (s !== coreWrittenOpacity) { coreCanvas.style.opacity = s; coreWrittenOpacity = s; }
}
function asymmetricBreath(phase) {
  // Normalize phase to 0-1 cycle
  const t = (phase % (Math.PI * 2)) / (Math.PI * 2);
  if (t < 0.4) {
    // Inhale: 0→1 in 40% of cycle (fast rise)
    return t / 0.4;
  } else if (t < 0.9) {
    // Exhale: 1→0 in 50% of cycle (slow fall)
    return 1 - (t - 0.4) / 0.5;
  } else {
    // Plateau at bottom: hold near 0 for 10% of cycle
    return 0;
  }
}
function updateCoreBreath(dt) {
  coreBreathPhase += dt * 0.0001;

  // ── 真空-purity gate ──────────────────────────────────────────────
  // 只在 true-emptiness(SILENCE 且 isTrueEmptiness)時讓 core 骨架溶入虛空 → 0。
  // SCOPE:一般 SILENCE(!isTrueEmptiness)絕不進這支,維持既有 breathing,
  //        否則每個 cycle 間的短暫靜默都會把 core 閃黑、破壞節律。
  // TIMING:不受 coreRedrawTimer(2000ms)節流,每幀即時收斂 → 真空一開始就生效。
  // 平滑:per-frame 指數衰減(~0.6s 入虛空),勝過硬切。
  if (isTrueEmptiness && breathState === BREATH.SILENCE) {
    const k = 1 - Math.exp(-dt / 200);          // dt→0 時 0、~600ms 達 ~95%
    coreAppliedOpacity += (0 - coreAppliedOpacity) * k;
    if (coreAppliedOpacity < 0.002) coreAppliedOpacity = 0;
    setCoreOpacity(coreAppliedOpacity);
    coreVoidGating = true;
    return;
  }

  // ── RESTORE(真空→重生 edge):core 被收斂到接近 0,需平滑 fade-in ──────
  // 真空結束後 isTrueEmptiness 變回 false → 走到這。先用 per-frame lerp 把
  // coreAppliedOpacity 追上既有 breath target,避免卡在 0 或 pop;追上後
  // 清旗標、交還給原本「每 2s 離散更新」的呼吸路徑(手感完全不變)。
  if (coreVoidGating) {
    const breath = asymmetricBreath(coreBreathPhase);
    const target = 0.15 + breath * 0.7;
    const k = 1 - Math.exp(-dt / 200);          // 對稱地 fade-in,~0.6s
    coreAppliedOpacity += (target - coreAppliedOpacity) * k;
    setCoreOpacity(coreAppliedOpacity);
    if (Math.abs(target - coreAppliedOpacity) < 0.01) {
      coreVoidGating = false;                    // 收斂完成 → 回正常路徑
      coreRedrawTimer = 0;                       // 對齊 cadence,下個 sample 自然接續
    }
    return;
  }

  // ── 正常呼吸(BIRTH/LIVING/DYING/一般 SILENCE):既有行為,原封不動 ──────
  // Redraw core grid every 2 seconds with updated alpha
  coreRedrawTimer += dt;
  if (coreRedrawTimer > 2000) {
    coreRedrawTimer = 0;
    const breath = asymmetricBreath(coreBreathPhase);
    coreAppliedOpacity = 0.15 + breath * 0.7;    // 鏡像記錄,供下次 gate 起點正確
    setCoreOpacity(coreAppliedOpacity);          // range 0.15 to 0.85(write-on-change)
  }
}

// === PATTERNS ===
const bgPatterns = [];
const beingPatterns = [];

// Track dead pattern positions for inheritance [Fix #16]
let deadPatternRecords = [];
// Track being vacancy timers [Fix #25]
let beingVacancies = [];
// Limit spawning per frame [Fix #18]
let spawnedThisFrame = 0;

function spawnBgPattern(inheritRecord) {
  // Only arc and spiral — ray/ring removed (too mechanical, breaks visual unity)
  const types = ['arc', 'spiral'];
  const weights = [
    1 + field.order * 2,   // arc: favored by order
    1 + field.energy * 2,  // spiral: favored by energy
  ];
  const total = weights.reduce((a, b) => a + b, 0);
  let rv = entropy() * total;
  let type = types[0];
  for (let i = 0; i < weights.length; i++) {
    rv -= weights[i];
    if (rv <= 0) { type = types[i]; break; }
  }

  let dist, theta;

  // [Fix #16] Inherit position from dead pattern if available
  if (inheritRecord) {
    dist = inheritRecord.r + (entropy() - 0.5) * R * 0.1;
    theta = inheritRecord.theta + (entropy() - 0.5) * 0.3;
    type = inheritRecord.type; // inherit type from dead pattern
  } else {
    dist = R * (0.1 + entropy() * 0.7);
    theta = entropy() * Math.PI * 2;
  }

  dist = Math.max(R * 0.05, Math.min(R * 0.85, dist));

  // P2-18: Math.random() for lifespan — need dramatic extremes, not central tendency
  let maxLife = 3000 + Math.random() * 15000;
  // [Fix #11] Distance-driven gradient
  maxLife *= (1.5 - dist / R);

  const baseRotSpeed = (entropy() - 0.5) * 0.0003;

  return {
    type,
    r: dist,
    theta,
    age: 0,
    maxLife,
    alpha: 0,
    // Type-specific params
    arcSpan: 0.2 + entropy() * 0.6,
    spiralTurns: 1 + entropy() * 2,
    lineWidth: 0.5 + entropy() * 1.5,
    colorKey: entropy() > 0.5 ? fieldPrimaryColor() : fieldSecondaryColor(),
    // [Fix #11] rotSpeed and lineWidth scaled by distance
    rotSpeed: baseRotSpeed * (dist / R),
    isBeing: false,
    // [Fix #15] Birth animation: track target spans for grow-in effect
    birthArcSpan: 0,
    targetArcSpan: 0.2 + entropy() * 0.6,
    // Child arcs: 0-2 nested inner arcs that give organic structure
    children: [],
  };
}

// [Fix #11] Apply distance-driven lineWidth adjustment at render time
function distanceLineWidth(p) {
  return p.lineWidth * (1.2 - p.r / R * 0.4);
}

function updatePatternLife(p, dt) {
  p.age += dt;
  p.theta += p.rotSpeed * dt;
  // Fade in/out
  const fadeTime = 1500;
  if (p.age < fadeTime) {
    p.alpha = p.age / fadeTime;
    // Birth animation: grow arc span during fadeIn ("drawing" effect)
    if (p.type === 'arc') {
      p.arcSpan = p.targetArcSpan * (p.age / fadeTime);
    }
  } else if (p.age > p.maxLife - fadeTime) {
    p.alpha = Math.max(0, (p.maxLife - p.age) / fadeTime);
  } else {
    p.alpha = 1;
    p.arcSpan = p.targetArcSpan;
    // B2+V1: spawn children ONCE after birth completes, store OFFSETS not absolute angles
    if (p.type === 'arc' && p.children.length === 0 && entropy() < 0.4) {
      const numChildren = 1 + Math.floor(entropy() * 2);
      for (let c = 0; c < numChildren; c++) {
        const shrink = 0.7 - c * 0.15;
        p.children.push({
          rScale: shrink,               // relative to parent r
          startOffset: -p.targetArcSpan * 0.4 + c * 0.08,  // relative to parent theta
          endOffset: p.targetArcSpan * 0.4 - c * 0.08,
          widthScale: 0.5 - c * 0.1,
        });
      }
    }
  }
  return p.age < p.maxLife;
}

function managePatterns(dt) {
  spawnedThisFrame = 0;
  // Update existing
  for (let i = bgPatterns.length - 1; i >= 0; i--) {
    if (!updatePatternLife(bgPatterns[i], dt)) {
      // [Fix #16] Record dead pattern's position/type for inheritance
      const dead = bgPatterns[i];
      deadPatternRecords.push({ r: dead.r, theta: dead.theta, type: dead.type });
      if (deadPatternRecords.length > 20) deadPatternRecords.shift();
      bgPatterns.splice(i, 1);
    }
  }
  // [Fix #12] Minimum pattern count: min 3
  const targetCount = Math.floor(3 + field.energy * 35 + field.order * 12);
  while (bgPatterns.length < targetCount && spawnedThisFrame < 3) { // [Fix #18] max 3 per frame
    // [Fix #16] Spawn from dead records when available
    const inherit = deadPatternRecords.length > 0 ? deadPatternRecords.shift() : null;
    bgPatterns.push(spawnBgPattern(inherit));
    spawnedThisFrame++;
  }
}

// === PATTERN RENDERING ===
function renderPattern(p) {
  if (p.alpha < 0.01) return;
  const fadeFromCenter = Math.min(1, p.r / (R * 0.2));
  // P1-9: smoothstep edge fade — no hard boundary at R*0.7
  const fadeAtEdge = Math.pow(Math.max(0, 1 - (p.r / R - 0.6) / 0.4), 2);

  // [Fix #28] Directional breathing: BIRTH uses r-based delay, DYING uses r-based delay
  let dirAlpha = 1;
  if (breathState === BREATH.BIRTH) {
    // Inner patterns appear first: delay = r/R * birthDur * 0.5
    const rDelay = (p.r / R) * birthDur * 0.5;
    const adjusted = Math.max(0, breathTimer - rDelay);
    dirAlpha = Math.min(1, adjusted / 1500);
  } else if (breathState === BREATH.DYING) {
    // Outer patterns fade first
    const rDelay = (1 - p.r / R) * dyingDur * 0.5;
    const adjusted = Math.max(0, breathTimer - rDelay);
    let fadeProgress = Math.min(1, adjusted / 1500);
    // [Fix #29] Final 5%: snap alpha to 0 instantly
    if (fadeProgress > 0.95) fadeProgress = 1;
    dirAlpha = 1 - fadeProgress;
  }

  // P0-4: simplified alpha — three layers max. fadeFromCenter and dirAlpha baked into p.alpha via lifecycle.
  // colorMaturity no longer affects alpha (controls color selection instead).
  const a = p.alpha * breathAlpha * fadeAtEdge * dirAlpha * fadeFromCenter;
  if (a < 0.005) return;

  const lw = distanceLineWidth(p);
  const color = hsl(p.colorKey, a * 0.85);
  // Embedded edge: use a dimmer version of the pattern's own color
  const embedColor = hsl(p.colorKey, a * 0.15);

  switch (p.type) {
    case 'arc': {
      const startAngle = p.theta - p.arcSpan / 2;
      const endAngle = p.theta + p.arcSpan / 2;
      // Outer arc — collect points, then strokeThangka
      const outerPts = arcToPoints(CX, CY, p.r, startAngle, endAngle);
      strokeThangka(outerPts, lw, color, a, embedColor);
      // Inner petal arc
      const innerR = p.r * 0.85;
      const sx = CX + Math.cos(startAngle) * p.r;
      const sy = CY + Math.sin(startAngle) * p.r;
      const ex = CX + Math.cos(endAngle) * p.r;
      const ey = CY + Math.sin(endAngle) * p.r;
      const midAngle = (startAngle + endAngle) / 2;
      const petalDepth = (p.r - innerR) * 1.5;
      const cpx = CX + Math.cos(midAngle) * (p.r - petalDepth);
      const cpy = CY + Math.sin(midAngle) * (p.r - petalDepth);
      // Approximate the quadratic curve as points
      const innerPts = [];
      for (let i = 0; i <= 10; i++) {
        const t = i / 10;
        const x = (1-t)*(1-t)*sx + 2*(1-t)*t*cpx + t*t*ex;
        const y = (1-t)*(1-t)*sy + 2*(1-t)*t*cpy + t*t*ey;
        innerPts.push({x, y});
      }
      strokeThangka(innerPts, lw * 0.8, color, a, null);
      // P2-20: nested arcs at high energy + high order — visual density without more patterns
      if (field.energy > 0.7 && field.order > 0.7) {
        const nestR = p.r * 0.75;
        const nestPts = arcToPoints(CX, CY, nestR, startAngle + 0.05, endAngle - 0.05);
        strokeThangka(nestPts, lw * 0.6, color, a * 0.5, null);
      }
      break;
    }
    case 'spiral': {
      const steps = Math.floor(15 + 15 * (1 - p.r / R));
      const pts = [];
      for (let s = 0; s <= steps; s++) {
        const t = s / steps;
        const sr = p.r - t * p.r * 0.3;
        const sa = p.theta + t * p.spiralTurns * Math.PI * 0.5;
        pts.push({ x: CX + Math.cos(sa) * sr, y: CY + Math.sin(sa) * sr });
      }
      strokeThangka(pts, lw, color, a, embedColor);
      break;
    }
  }

  // Render child arcs (nested inner structure)
  // V1: children use offsets relative to parent's CURRENT theta and r
  if (p.children && p.children.length > 0) {
    for (const child of p.children) {
      const cr = p.r * child.rScale;
      const cStart = p.theta + child.startOffset;
      const cEnd = p.theta + child.endOffset;
      const childPts = arcToPoints(CX, CY, cr, cStart, cEnd);
      strokeThangka(childPts, lw * child.widthScale, color, a * 0.6, null);
    }
  }
}

// === BEINGS (眾生) ===
// Each being is a trackable individual with distinct visual signature

// [Fix #20] Dedicated colors for beings — cycle through palette keys
const BEING_COLORS = ['gold', 'vermilion', 'emerald', 'deepBlue', 'purple', 'warmWhite'];
let beingColorIdx = 0;

function spawnBeing(inheritR, inheritTheta, inheritType, inheritArcSpan) {
  const dist = (inheritR !== undefined) ? inheritR : R * (0.15 + entropy() * 0.5); // [Fix #26]
  const theta = (inheritTheta !== undefined) ? inheritTheta : entropy() * Math.PI * 2; // [Fix #26]

  // [Fix #26] Inherit type + arcSpan from predecessor
  const type = (inheritType !== undefined) ? inheritType : ['arc', 'spiral'][Math.floor(entropy() * 2)];
  const arcSpan = (inheritArcSpan !== undefined) ? inheritArcSpan : (0.3 + entropy() * 0.5);

  // [Fix #20] Dedicated color from PALETTE, not field-dependent
  const colorKey = BEING_COLORS[beingColorIdx % BEING_COLORS.length];
  beingColorIdx = (beingColorIdx + 1) % BEING_COLORS.length; // B4: prevent unbounded growth

  return {
    type,
    r: Math.max(R * 0.05, Math.min(R * 0.7, dist)),
    theta,
    age: 0,
    maxLife: 15000 + Math.random() * 45000, // P2-18: dramatic range
    alpha: 0,
    arcSpan,
    spiralTurns: 1.5 + entropy() * 1.5,
    // [Fix #20] Min lineWidth 1.5
    lineWidth: Math.max(1.5, 1 + entropy() * 1.5),
    colorKey,
    rotSpeed: (entropy() - 0.5) * 0.0002,
    isBeing: true,
    // Signature variations
    curveBias: (entropy() - 0.5) * 20,
    sizeScale: 0.8 + entropy() * 0.4,
    phaseOffset: entropy() * Math.PI * 2,
    dying: false,
    deathTimer: 0,
    fragments: [],
  };
}

function renderBeing(b) {
  if (b.alpha < 0.01 && !b.dying) return;
  const fadeFromCenter = Math.min(1, b.r / (R * 0.15));

  // [Fix #28] Directional breathing for beings
  let dirAlpha = 1;
  if (breathState === BREATH.BIRTH) {
    const rDelay = (b.r / R) * birthDur * 0.5;
    const adjusted = Math.max(0, breathTimer - rDelay);
    dirAlpha = Math.min(1, adjusted / 2000);
  } else if (breathState === BREATH.DYING) {
    const rDelay = (1 - b.r / R) * dyingDur * 0.5;
    const adjusted = Math.max(0, breathTimer - rDelay);
    let fadeProgress = Math.min(1, adjusted / 2000);
    // [Fix #29] Final 5%: snap alpha to 0
    if (fadeProgress > 0.95) fadeProgress = 1;
    dirAlpha = 1 - fadeProgress;
  }

  // P0-4: simplified alpha, no colorMaturity multiplier
  const a = b.alpha * breathAlpha * fadeFromCenter * dirAlpha;
  if (a < 0.005 && !b.dying) return;

  // P2-19: shadowBlur removed — embedColor already provides glow, shadowBlur is perf-heavy

  ctx.strokeStyle = hsl(b.colorKey, a * 0.85);
  ctx.lineWidth = b.lineWidth * b.sizeScale;
  ctx.lineCap = 'round';

  if (b.dying) {
    // Death animation: fragments scatter
    for (const f of b.fragments) {
      // P1-8: slower drift
      f.r += f.vr * 0.3;
      f.theta += f.vt;
      // [Fix #23] Add friction
      f.vr *= 0.96;
      f.alpha *= 0.993; // P1-8: slower fade — silk unraveling
      if (f.alpha < 0.01) continue;
      const fx = CX + Math.cos(f.theta) * f.r;
      const fy = CY + Math.sin(f.theta) * f.r;
      ctx.strokeStyle = hsl(b.colorKey, f.alpha * breathAlpha);
      ctx.lineWidth = f.width;
      ctx.beginPath();
      ctx.moveTo(fx, fy);
      ctx.lineTo(fx + Math.cos(f.angle) * f.len, fy + Math.sin(f.angle) * f.len);
      ctx.stroke();
    }
    return;
  }

  // Living: collect path points, then use strokeThangka for breathing lines
  const beingColor = hsl(b.colorKey, a * 0.85);
  const beingEmbed = hsl(b.colorKey, a * 0.2);
  const beingLw = b.lineWidth * b.sizeScale;

  if (b.type === 'arc') {
    const span = b.arcSpan * b.sizeScale;
    const steps = 12; // more steps for beings = smoother breathing
    const pts = [];
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      const angle = b.theta - span / 2 + t * span;
      const maxWobble = R * 0.008; // V2: visible individuality
      const rawWobble = Math.sin(t * Math.PI * 3 + b.phaseOffset + b.age * 0.001) * b.curveBias * 0.1;
      const wobble = Math.max(-maxWobble, Math.min(maxWobble, rawWobble));
      const pr = b.r + wobble;
      pts.push({ x: CX + Math.cos(angle) * pr, y: CY + Math.sin(angle) * pr });
    }
    strokeThangka(pts, beingLw, beingColor, a, beingEmbed);
  } else {
    const steps = 24; // more steps for beings
    const pts = [];
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      const sr = b.r * (1 - t * 0.3) * b.sizeScale;
      const sa = b.theta + t * b.spiralTurns * Math.PI * 0.5;
      const maxWobble = R * 0.008; // V2: visible individuality
      const rawWobble = Math.sin(t * Math.PI * 2 + b.phaseOffset + b.age * 0.0008) * b.curveBias * 0.15;
      const wobble = Math.max(-maxWobble, Math.min(maxWobble, rawWobble));
      pts.push({ x: CX + Math.cos(sa) * (sr + wobble), y: CY + Math.sin(sa) * (sr + wobble) });
    }
    strokeThangka(pts, beingLw, beingColor, a, beingEmbed);
  }

}

// [Fix #21] stampBeingTrace must draw actual being shape, not just arc
function stampBeingTrace(b) {
  traceCtx.save();
  traceCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  traceCtx.globalAlpha = 0.2;
  traceCtx.strokeStyle = hsl(b.colorKey, 0.3);
  traceCtx.lineWidth = b.lineWidth * 0.5;
  traceCtx.lineCap = 'round';

  if (b.type === 'arc') {
    const span = b.arcSpan * b.sizeScale;
    const steps = 8;
    traceCtx.beginPath();
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      const angle = b.theta - span / 2 + t * span;
      const pr = b.r;
      const px = CX + Math.cos(angle) * pr;
      const py = CY + Math.sin(angle) * pr;
      if (s === 0) { traceCtx.moveTo(px, py); continue; }
      const prevAngle = b.theta - span / 2 + ((s - 1) / steps) * span;
      const cpR = b.r + b.curveBias * 0.3;
      const cp1x = CX + Math.cos(prevAngle + span / steps * 0.3) * cpR;
      const cp1y = CY + Math.sin(prevAngle + span / steps * 0.3) * cpR;
      const cp2x = CX + Math.cos(angle - span / steps * 0.3) * cpR;
      const cp2y = CY + Math.sin(angle - span / steps * 0.3) * cpR;
      traceCtx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, px, py);
    }
    traceCtx.stroke();
  } else {
    // Spiral trace
    traceCtx.beginPath();
    const steps = 20;
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      const sr = b.r * (1 - t * 0.3) * b.sizeScale;
      const sa = b.theta + t * b.spiralTurns * Math.PI * 0.5;
      const sx = CX + Math.cos(sa) * sr;
      const sy = CY + Math.sin(sa) * sr;
      if (s === 0) { traceCtx.moveTo(sx, sy); continue; }
      const prevT = (s - 1) / steps;
      const prevR = b.r * (1 - prevT * 0.3) * b.sizeScale;
      const prevA = b.theta + prevT * b.spiralTurns * Math.PI * 0.5;
      const midT = (prevT + t) / 2;
      const midR = b.r * (1 - midT * 0.3) * b.sizeScale;
      const midA = b.theta + midT * b.spiralTurns * Math.PI * 0.5;
      const cp1x = CX + Math.cos(prevA + (midA - prevA) * 0.4) * (prevR + b.curveBias * 0.15);
      const cp1y = CY + Math.sin(prevA + (midA - prevA) * 0.4) * (prevR + b.curveBias * 0.15);
      const cp2x = CX + Math.cos(midA + (sa - midA) * 0.6) * midR;
      const cp2y = CY + Math.sin(midA + (sa - midA) * 0.6) * midR;
      traceCtx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, sx, sy);
    }
    traceCtx.stroke();
  }

  traceCtx.globalAlpha = 1.0;
  traceCtx.restore();
}

function updateBeing(b, dt) {
  if (b.dying) {
    b.deathTimer += dt;
    return b.deathTimer < 3000;
  }
  b.age += dt;
  b.theta += b.rotSpeed * dt;
  // Fade in/out
  if (b.age < 2500) {
    b.alpha = b.age / 2500;
  } else if (b.age > b.maxLife - 2000) {
    b.alpha = Math.max(0, (b.maxLife - b.age) / 2000);
  } else {
    b.alpha = 1;
  }
  // [Fix #24] Death trigger at alpha <= 0.01, not waiting 2s gap
  if (b.alpha <= 0.01 && b.age > 2500 && !b.dying) {
    b.dying = true;
    b.deathTimer = 0;
    // Create fragments
    // P1-8: fewer, longer, slower fragments — silk unraveling, not glass shattering
    const numFrags = 3 + Math.floor(entropy() * 4);
    for (let i = 0; i < numFrags; i++) {
      b.fragments.push({
        r: b.r + (entropy() - 0.5) * 20,
        theta: b.theta + (entropy() - 0.5) * b.arcSpan,
        // [Fix #23] Fragment velocity range (entropy()-0.5)*8
        vr: (entropy() - 0.5) * 8,
        vt: (entropy() - 0.5) * 0.01,
        angle: entropy() * Math.PI * 2,
        len: 10 + entropy() * 15,
        width: 0.3 + entropy() * 0.8,
        alpha: 0.6 + entropy() * 0.4,
      });
    }
    // Stamp to trace -- only beings leave marks
    stampBeingTrace(b);
  }
  return true;
}

function manageBeings(dt) {
  // Update vacancies [Fix #25]
  for (let i = beingVacancies.length - 1; i >= 0; i--) {
    beingVacancies[i].timer -= dt;
    if (beingVacancies[i].timer <= 0) {
      // [Fix #26] Inherit type + arcSpan from predecessor
      const v = beingVacancies[i];
      if (spawnedThisFrame < 3) { // [Fix #18]
        beingPatterns.push(spawnBeing(
          v.r + (entropy() - 0.5) * R * 0.2,
          v.theta + (entropy() - 0.5) * 0.5,
          v.type,
          v.arcSpan
        ));
        spawnedThisFrame++;
      }
      beingVacancies.splice(i, 1);
    }
  }

  for (let i = beingPatterns.length - 1; i >= 0; i--) {
    if (!updateBeing(beingPatterns[i], dt)) {
      const dead = beingPatterns[i];
      // [Fix #25] Delay before replacement: 3-8s vacancy. P4: cap at 12
      if (beingVacancies.length > 12) beingVacancies.shift();
      beingVacancies.push({
        r: dead.r,
        theta: dead.theta,
        type: dead.type,
        arcSpan: dead.arcSpan,
        timer: 3000 + entropy() * 5000,
      });
      beingPatterns.splice(i, 1);
    }
  }

  // Maintain 5-8 beings (accounting for vacancies)
  const targetBeings = 5 + Math.floor(field.energy * 3);
  const totalPending = beingPatterns.length + beingVacancies.length;
  while (totalPending < targetBeings && beingPatterns.length < targetBeings && spawnedThisFrame < 3) {
    beingPatterns.push(spawnBeing());
    spawnedThisFrame++;
    break; // only spawn one fresh being per frame to avoid bulk spawning
  }
  while (beingPatterns.length > targetBeings + 2) beingPatterns.pop();
}

// P1: pre-allocated sort array to reduce GC pressure in long runs
const _sortBuf = [];
function renderAllPatterns() {
  _sortBuf.length = 0;
  for (const p of bgPatterns) _sortBuf.push(p);
  for (const b of beingPatterns) _sortBuf.push(b);
  _sortBuf.sort((a, b) => a.r - b.r);
  for (const p of _sortBuf) {
    if (p.isBeing) renderBeing(p); else renderPattern(p);
  }
}

// === BREATH ===
const BREATH = { BIRTH: 0, LIVING: 1, DYING: 2, SILENCE: 3 };
let breathState = BREATH.BIRTH;
let breathTimer = 0;
let breathAlpha = 0;
let birthDur, livingDur, dyingDur, silenceDur;

function easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

function chooseEra() {
  prevEra = currentEra;
  let weights = [1, 1, 1, 1]; // BLOOM, SPARSE, STORM, DRIFT
  if (abundance > 0.65) { weights[0] += 3; weights[1] -= 0.5; }
  if (abundance < 0.35) { weights[1] += 3; weights[0] -= 0.5; }
  const dAbundance = 0.3 * Math.cos(macroPhase1) * 0.000021 + 0.2 * Math.cos(macroPhase2) * 0.0000052;
  // B7: threshold raised — max dAbundance ~0.0000073, so 0.000005 triggers only during rapid shifts
  if (Math.abs(dAbundance) > 0.000005) { weights[2] += 2; }
  if (abundance > 0.3 && abundance < 0.6) { weights[3] += 1.5; }
  if (prevEra === currentEra) { weights[currentEra] *= 0.15; }
  weights = weights.map(w => Math.max(0.1, w));
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < 4; i++) {
    r -= weights[i];
    if (r <= 0) { currentEra = i; return; }
  }
  currentEra = 0;
}

function beginLife() {
  chooseEra();
  isReborn = false;
  const ls = 0.3 + abundance * 1.4;
  const ss = 0.3 + (1 - abundance) * 2;

  switch (currentEra) {
    case ERA.BLOOM:
      birthDur = (2000 + entropy() * 3000) * ls;
      livingDur = (10000 + entropy() * 35000) * ls;
      dyingDur = (8000 + entropy() * 15000) * ls;
      silenceDur = (300 + entropy() * 3000) * ss;
      livingBreathBase = 1.0; livingBreathAmp = 0;
      break;
    case ERA.SPARSE:
      birthDur = (3000 + entropy() * 5000) * ls;
      livingDur = (3000 + entropy() * 10000) * ls;
      dyingDur = (10000 + entropy() * 20000) * ls;
      silenceDur = (3000 + entropy() * 15000) * ss;
      livingBreathBase = 0.85; livingBreathAmp = 0.1;
      break;
    case ERA.STORM:
      birthDur = (8000 + entropy() * 7000) * ls;
      livingDur = (4000 + entropy() * 12000) * ls;
      dyingDur = (3000 + entropy() * 6000) * ls;
      silenceDur = (500 + entropy() * 2000) * ss;
      livingBreathBase = 1.0; livingBreathAmp = 0;
      break;
    case ERA.DRIFT:
      birthDur = (2000 + entropy() * 4000) * ls;
      livingDur = (8000 + entropy() * 25000) * ls;
      dyingDur = (12000 + entropy() * 18000) * ls;
      silenceDur = (1000 + entropy() * 6000) * ss;
      livingBreathBase = 0.75; livingBreathAmp = 0.15;
      break;
  }
  livingDur = Math.max(8000, livingDur);
  silenceDur = Math.min(5000, silenceDur); // cap normal silence at 5s (true emptiness overrides)
  midlifeShiftDone = false;
  midlifeShiftPoint = 0.35 + Math.random() * 0.3;
  breathState = BREATH.BIRTH;
  breathTimer = 0;
  chooseNextTarget();
}

function updateBreath(dt) {
  breathTimer += dt;
  switch (breathState) {
    case BREATH.BIRTH:
      if (currentEra === ERA.STORM && !isReborn) {
        const baseRise = easeInOut(Math.min(breathTimer / birthDur, 1));
        const flicker = Math.sin(breathTimer * 0.003) * 0.15;
        breathAlpha = Math.max(0.1, Math.min(0.5, baseRise * 0.5 + flicker));
      } else {
        breathAlpha = easeInOut(Math.min(breathTimer / birthDur, 1));
      }
      if (breathTimer >= birthDur) {
        breathState = BREATH.LIVING; breathTimer = 0;
        if (currentEra === ERA.STORM && !isReborn) {
          fieldTarget.energy = 0.75 + Math.random() * 0.25;
          fieldTarget.order = Math.random();
          deriveParams();
        }
      }
      break;

    case BREATH.LIVING:
      if (livingBreathAmp > 0) {
        breathAlpha = livingBreathBase + Math.sin(breathTimer * 0.0008) * livingBreathAmp;
      } else {
        breathAlpha = 1;
      }

      if (!midlifeShiftDone && breathTimer > livingDur * midlifeShiftPoint) {
        midlifeShiftDone = true;
        if (currentEra === ERA.STORM) {
          chooseNextTarget();
        } else {
          fieldTarget.energy = Math.max(0, Math.min(1, field.energy + (Math.random() - 0.5) * 0.2));
          fieldTarget.order = Math.max(0, Math.min(1, field.order + (Math.random() - 0.5) * 0.2));
          deriveParams();
        }
      }

      // STORM: extra high-frequency field oscillation
      if (currentEra === ERA.STORM) {
        const stormCheck = Math.floor(breathTimer / 4000);
        const prevCheck = Math.floor((breathTimer - dt) / 4000);
        if (stormCheck > prevCheck) chooseNextTarget();
      }

      // Rare event: sudden death (~3.5% per 30s LIVING)
      if (!isReborn && Math.random() < 0.00002) {
        breathState = BREATH.DYING; breathTimer = 0; dyingDur = 200;
        break;
      }

      if (breathTimer >= livingDur) {
        breathState = BREATH.DYING; breathTimer = 0;
        fieldTarget.energy = entropy() * 0.1;
        fieldTarget.order = Math.max(0, Math.min(1, field.order + (entropy() - 0.5) * 0.3));
        deriveParams();
      }
      break;

    case BREATH.DYING: {
      const progress = Math.min(breathTimer / dyingDur, 1);

      // Rare event: rebirth (~2% during DYING 30-70%)
      if (!isReborn && progress > 0.3 && progress < 0.7 && Math.random() < 0.0001) {
        isReborn = true;
        breathState = BREATH.LIVING; breathTimer = 0;
        livingDur = Math.max(3000, livingDur * (0.3 + Math.random() * 0.2));
        fieldTarget.energy = 0.8 + Math.random() * 0.2;
        fieldTarget.order = Math.random() * 0.3;
        livingBreathBase = 0.9; livingBreathAmp = 0.1;
        midlifeShiftDone = true;
        deriveParams();
        break;
      }

      breathAlpha = progress > 0.95 ? 0 : 1 - easeInOut(progress);
      if (breathTimer >= dyingDur) {
        checkTrueEmptiness();
        breathState = BREATH.SILENCE; breathTimer = 0;
        bgPatterns.length = 0;
      }
      break;
    }
    case BREATH.SILENCE:
      breathAlpha = 0;
      if (breathTimer >= silenceDur) {
        if (isTrueEmptiness) { traceCanvas.style.opacity = '1'; isTrueEmptiness = false; }
        beginLife();
      }
      break;
  }
}

// === TRACES ===
let traceFadeTimer = 0;
function fadeTrace(dt) {
  traceFadeTimer += dt;
  if (traceFadeTimer < 400) return; // ~2.5 times per second
  traceFadeTimer = 0;
  traceCtx.save();
  traceCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  traceCtx.globalCompositeOperation = 'destination-out';
  // [Fix #31] Trace fade rate: rgba(0,0,0,0.04)
  traceCtx.fillStyle = 'rgba(0,0,0,0.04)';
  traceCtx.fillRect(0, 0, W, H);
  traceCtx.globalCompositeOperation = 'source-over';
  traceCtx.restore();
}

// === EMPTINESS ===
let isTrueEmptiness = false;
function checkTrueEmptiness() {
  // [Fix #30] True emptiness probability: 6%
  isTrueEmptiness = entropy() < 0.06;
  if (isTrueEmptiness) {
    silenceDur = 15000 + entropy() * 90000;
    traceCanvas.style.opacity = '0';
    // P5: clear pixel data to prevent sub-pixel ghost accumulation over hours
    traceCtx.save();
    traceCtx.setTransform(1, 0, 0, 1, 0, 0);
    traceCtx.clearRect(0, 0, traceCanvas.width, traceCanvas.height);
    traceCtx.restore();
  }
}

// === BUDDHA-NATURE ===
let bnVisible = true, bnTimer = 0, bnVanishDur = 0;
const BN_SIZE = 3;
let bnPosInitialized = false;
let bnRealX, bnRealY;

function initBNPos() {
  if (bnPosInitialized) return;
  bnPosInitialized = true;
  // [Fix #32] Near center using entropy
  bnRealX = CX + (entropy() - 0.5) * R * 0.3;
  bnRealY = CY + (entropy() - 0.5) * R * 0.3;
}

function updateBN(dt) {
  initBNPos();
  bnTimer += dt;
  if (!bnVisible) {
    bnVanishDur -= dt;
    if (bnVanishDur <= 0) bnVisible = true;
  } else if (bnTimer > 30000) {
    bnTimer = 0;
    if (entropy() < 0.05) { bnVisible = false; bnVanishDur = 30000 + entropy() * 90000; }
  }
}

function drawBN() {
  initBNPos();

  // [Fix #34] During true emptiness, buddha-nature starts glimmering in last 3s before void ends
  if (isTrueEmptiness && breathState === BREATH.SILENCE) {
    const timeLeft = silenceDur - breathTimer;
    if (timeLeft > 3000) return; // hidden during most of true emptiness
    // Glimmer in last 3s
    const glimmerProgress = 1 - (timeLeft / 3000);
    const a = 0.03 * glimmerProgress * (0.5 + Math.sin(performance.now() * 0.003) * 0.5);
    if (a < 0.003) return;
    ctx.fillStyle = hsl('gold', a);
    ctx.beginPath();
    ctx.arc(bnRealX, bnRealY, BN_SIZE, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  if (!bnVisible) return;

  // [Fix #33] Buddha-nature appears in last 2s of SILENCE (before anything else)
  let bnAlpha = 0;
  if (breathState === BREATH.SILENCE) {
    const timeLeft = silenceDur - breathTimer;
    if (timeLeft < 2000) {
      bnAlpha = (2000 - timeLeft) / 2000; // fade in during last 2s of silence
    } else {
      return; // hidden during silence
    }
  } else if (breathState === BREATH.BIRTH && breathTimer < 2000) {
    bnAlpha = 0.5 + breathTimer / 4000; // already partially visible from silence transition
  } else if (breathState === BREATH.DYING && breathTimer > dyingDur - 2000) {
    // Last to vanish
    bnAlpha = Math.max(0, (dyingDur - breathTimer) / 2000);
  } else if (breathState === BREATH.DYING) {
    bnAlpha = 1;
  } else {
    bnAlpha = 1;
  }

  // P1-10: brighter buddha-nature — range 0.03-0.13
  const pulseAlpha = 0.08 + Math.sin(performance.now() * 0.0008) * 0.05;
  const a = pulseAlpha * bnAlpha;
  if (a < 0.005) return;

  ctx.fillStyle = hsl('gold', a);
  ctx.beginPath();
  ctx.arc(bnRealX, bnRealY, BN_SIZE, 0, Math.PI * 2);
  ctx.fill();
}

// ============================================================
//  2D FAUX-BLOOM  (維度一:halo — 光擴散進黑)
//  純 2D,零相依。只暈「該發光者」:暖金核心骨架 / 佛性金點 /
//  較亮的 being+pattern。疊回用 'lighter' 低 alpha;真空歸零。
//  研究 §1A/§8:純黑底上感知 ≈ WebGL HDR bloom。
// ============================================================

// ---- 設定(全部可調,已給 modest 硬體預算)----
const BLOOM = {
  DOWNSCALE: 6,          // glow buffer = CSS 尺寸 / 6(介於研究建議 4–8)
  BLUR_PX: 7,            // 在「降採樣後」座標系的模糊半徑(等效全解析 ~42px halo)
  MAX_ALPHA: 0.22,       // 疊回 'lighter' 的 alpha 上限(夠淡的天花板)
  EVERY_N: 3,            // 每 N 幀更新一次 glow(halo 是慢訊號,不必 60Hz)
  // glow source 取樣門檻:元素有效 alpha 低於此值就不進 glow(暗的不發光)
  SRC_MIN_A: 0.22,
  enabled: true,         // 偵測失敗時關閉,主畫面照常運作
};

// ---- offscreen:2 張,皆 reuse、永不每幀 new ----
// gBuf  = glow source(低解析,畫「該發光者」)
// gBlur = 模糊結果(疊回時的來源;與 gBuf 分開,避免 in-place filter 自取樣)
// coreGlow = 預烤的「核心骨架暖金」全解析快取(只在 resize/core redraw 時重畫)
let gBuf, gBufCtx, gBlur, gBlurCtx, coreGlow, coreGlowCtx;
let gW = 0, gH = 0;          // glow buffer 像素尺寸
let bloomFrame = 0;
let coreGlowDirty = true;    // resize 或 core 重畫後置 true

function initBloom() {
  // 能力偵測:filter blur 屬性存在即可;不存在就靠 downsample 雙線性當柔光。
  const probe = document.createElement('canvas').getContext('2d');
  if (!probe) { BLOOM.enabled = false; return; }
  // ('filter' in probe) 在所有現代瀏覽器為 true;留 try 防呆,不崩即可。

  gBuf  = document.createElement('canvas');
  gBlur = document.createElement('canvas');
  coreGlow = document.createElement('canvas');
  gBufCtx   = gBuf.getContext('2d');
  gBlurCtx  = gBlur.getContext('2d');
  coreGlowCtx = coreGlow.getContext('2d');
  resizeBloom();
}

// 在主 resize() 之後呼叫:依 CSS 尺寸(非 backing-store)算 glow buffer。
// glow 用 CSS 尺寸 / DOWNSCALE,刻意忽略 dpr —— halo 要被糊掉,不需要 HiDPI。
function resizeBloom() {
  if (!BLOOM.enabled) return;
  gW = Math.max(1, Math.round(W / BLOOM.DOWNSCALE));
  gH = Math.max(1, Math.round(H / BLOOM.DOWNSCALE));
  if (gBuf.width !== gW || gBuf.height !== gH) {
    gBuf.width = gW;   gBuf.height = gH;
    gBlur.width = gW;  gBlur.height = gH;
  }
  // coreGlow 用 CSS 尺寸即可(它會被縮進 gBuf,不需 backing-store 解析)
  if (coreGlow.width !== W || coreGlow.height !== H) {
    coreGlow.width = W; coreGlow.height = H;
  }
  coreGlowDirty = true;
}

// 預烤「核心骨架的暖金發光部分」到 coreGlow(全 CSS 解析,但只在變動時重畫)。
// 只取暖金(同心環 + 輻射 + 十字),省略 0.07 比例弧那種太淡的——它們不該發光。
// 用實心、略高 alpha 的金(因為等下會被縮小+模糊+低 alpha 疊回,這裡是「種子亮度」)。
function bakeCoreGlow() {
  if (!BLOOM.enabled) return;
  const c = coreGlowCtx;
  c.setTransform(1, 0, 0, 1, 0, 0);
  c.clearRect(0, 0, W, H);
  c.lineCap = 'round';
  c.strokeStyle = 'hsla(44, 80%, 55%, 0.9)'; // 暖金種子(疊回時會被 alpha 壓很淡)
  // 同心環
  c.lineWidth = 1.2;
  let cr = R * 0.05;
  while (cr < R) {
    c.beginPath();
    c.arc(CX, CY, cr, 0, Math.PI * 2);
    c.stroke();
    cr *= 1.5;
  }
  // 16 輻射
  c.lineWidth = 1.0;
  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    c.beginPath();
    c.moveTo(CX, CY);
    c.lineTo(CX + Math.cos(a) * R * 0.95, CY + Math.sin(a) * R * 0.95);
    c.stroke();
  }
  // 十字(略亮)
  c.lineWidth = 1.4;
  c.beginPath();
  c.moveTo(CX - R * 0.95, CY); c.lineTo(CX + R * 0.95, CY);
  c.moveTo(CX, CY - R * 0.95); c.lineTo(CX, CY + R * 0.95);
  c.stroke();
  coreGlowDirty = false;
}

// 每幀(或每 N 幀)重建 glow source 並模糊。bAlpha = 當前 breathAlpha。
// 回傳是否成功產生可疊回的 glow(供 loop 決定要不要 composite)。
function buildBloom(bAlpha) {
  if (!BLOOM.enabled) return false;
  if (coreGlowDirty) bakeCoreGlow();

  const g = gBufCtx;
  // 1) 清 glow source。重點:這裡是黑底,只畫「該發光者」。
  g.setTransform(1, 0, 0, 1, 0, 0);
  g.clearRect(0, 0, gW, gH);
  // glow source 內部用 'lighter' 讓多個發光者自然累加(只在這張小 buffer 內,不影響主畫面)
  g.globalCompositeOperation = 'lighter';

  // 1a) 核心骨架:把預烤的 coreGlow 縮進 glow buffer(雙線性即第一層柔化)。
  //     核心骨架的「發光感」也隨呼吸:用 bAlpha 當權重,但給個地板 0.35
  //     —— 即使 LIVING 谷底,骨架仍是作品的恆在脈絡(core CSS opacity 本就 0.15–0.85)。
  g.imageSmoothingEnabled = true;
  g.globalAlpha = 0.5 * (0.35 + 0.65 * bAlpha);
  g.drawImage(coreGlow, 0, 0, W, H, 0, 0, gW, gH);

  // 座標轉換:主畫面世界座標 → glow buffer 座標(/ DOWNSCALE)。
  const s = 1 / BLOOM.DOWNSCALE;

  // 1b) 較亮的 being / pattern:只取有效 alpha ≥ SRC_MIN_A 的,粗略重畫成短弧。
  //     不跑 strokeThangka(breathing/embed 對被糊掉的東西毫無意義)。只要形狀+亮度。
  g.lineCap = 'round';
  _bloomStampList(beingPatterns, g, s, bAlpha, true);
  _bloomStampList(bgPatterns,    g, s, bAlpha, false);

  // 1c) 佛性金點:作品的「心」,一定進 glow(這是 halo 最該服務的對象,但要最淡)。
  //     用一個比實體點略大的金圓當種子,讓它在黑裡有一圈勉強可感的氣息。
  if (typeof bnRealX === 'number' && bnVisible) {
    g.globalAlpha = 0.6 * bAlpha;
    g.fillStyle = 'hsla(44, 80%, 60%, 1)';
    g.beginPath();
    g.arc(bnRealX * s, bnRealY * s, Math.max(1.2, (BN_SIZE * 1.6) * s), 0, Math.PI * 2);
    g.fill();
  }

  g.globalAlpha = 1;
  g.globalCompositeOperation = 'source-over';

  // 2) 模糊:gBuf → gBlur,用 GPU filter。gBlur 與 gBuf 分離,避免 in-place 自取樣。
  const b = gBlurCtx;
  b.setTransform(1, 0, 0, 1, 0, 0);
  b.clearRect(0, 0, gW, gH);
  try {
    b.filter = `blur(${BLOOM.BLUR_PX}px)`;
  } catch (e) {
    b.filter = 'none'; // 不支援就靠 downsample 的雙線性,仍是柔光
  }
  b.drawImage(gBuf, 0, 0);
  b.filter = 'none';
  return true;
}

// 把一個 pattern/being list 的「夠亮者」粗略蓋進 glow buffer。
function _bloomStampList(list, g, s, bAlpha, isBeing) {
  for (let i = 0; i < list.length; i++) {
    const p = list[i];
    // 有效亮度:沿用各自 render 的乘法鏈近似(p.alpha·breathAlpha)。
    const eff = p.alpha * bAlpha;
    if (eff < BLOOM.SRC_MIN_A) continue;          // 暗的不發光
    // 只暖色系發光感最強;冷色給較低權重(避免整畫面都暈)。
    const warm = (p.colorKey === 'gold' || p.colorKey === 'vermilion' ||
                  p.colorKey === 'warmWhite');
    g.globalAlpha = (warm ? 0.6 : 0.3) * (eff - BLOOM.SRC_MIN_A) / (1 - BLOOM.SRC_MIN_A);
    if (g.globalAlpha < 0.01) continue;
    g.strokeStyle = warm ? 'hsla(44,80%,58%,1)' : 'hsla(200,40%,60%,1)';
    g.lineWidth = Math.max(1, (p.lineWidth || 1) * (isBeing ? 1.4 : 1.0) * s * BLOOM.DOWNSCALE * 0.35);
    // 粗略主弧:不重建 petal/child/spiral 細節,只畫骨幹弧(被糊掉,形狀足矣)
    const span = (p.type === 'spiral')
      ? (p.spiralTurns || 1.5) * Math.PI * 0.5
      : (p.arcSpan || 0.4);
    const a0 = p.theta - span / 2, a1 = p.theta + span / 2;
    g.beginPath();
    g.arc(CX * s, CY * s, p.r * s, a0, a1);
    g.stroke();
  }
  g.globalAlpha = 1;
}

// 疊回主畫面。在 main ctx 已是 setTransform(dpr,...) 的座標系下呼叫。
// bAlpha 驅動強度;真空/SILENCE 由 loop 在呼叫前 gate 掉,不會進到這裡。
function compositeBloom(bAlpha) {
  if (!BLOOM.enabled) return;
  const a = Math.min(BLOOM.MAX_ALPHA, BLOOM.MAX_ALPHA * bAlpha);
  if (a < 0.004) return;                          // 夠淡判準:低於此不值得畫
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';       // halo 加進黑,不擋住線
  ctx.globalAlpha = a;
  ctx.imageSmoothingEnabled = true;
  // gBlur(gW×gH)放大鋪滿 CSS 尺寸(W×H);ctx 已含 dpr scale,座標用 CSS 尺寸即可。
  ctx.drawImage(gBlur, 0, 0, gW, gH, 0, 0, W, H);
  ctx.restore();
}

// ============================================================
//  絹本/棉布底材 (維度一:給黑一個身體)
//  純 2D、零相依。預烤一張 seamless 織紋 → 一次性鋪滿全螢幕
//  static canvas;之後每幀只動 CSS opacity(GPU compositor,零 JS)。
//  抬黑零容忍:tile 平均灰 ~9/255、CSS opacity 0.16 → 實測平均
//  抬升 1.44/255(< 鐵律 2/255)。真空時 opacity→0(身體退場)。
//  研究 §8 CODE③:「給黑一個身體;僅限勉強可感 且 真空歸零」。
// ============================================================

// ---- 可調旋鈕(集中,現場/微調用)----
const SUBSTRATE = {
  enabled:      true,   // ★ 底材總開關。false = 完全不建 canvas、不掛 DOM(回到死黑)
  intensity:    0.16,   // ★ 強度主旋鈕 = canvas CSS opacity 上限。
                        //    實測:0.16→平均抬升1.44/255;0.22 為硬天花板(平均1.98/255)。
                        //    範圍守則:勿超過 0.22(否則平均抬黑 >2/255 = 違反鐵律)。
  tile:         256,    // 預烤 tile 邊長(px)。seamless;256 在 2m 投影看不出週期。
  meanL:        9,      // tile 平均灰(0..255)。烤進像素的「底」,刻意壓在近黑帶。
  weaveAmp:     5,      // 經緯亮度擾動振幅(±, 0..255)。tooth 不是 floor:trough 趨近 0。
  warpFreq:     5.0,    // 經線(直)空間頻率(每 tile 週期數)。整數→seamless。密。
  weftFreq:     3.0,    // 緯線(橫)空間頻率(每 tile 週期數)。整數→seamless。疏。
  warpWeight:   0.62,   // 經線權重(上膠平織:經密緯疏 → 經略重)
  fiberAmp:     3.0,    // 纖維 value-noise 微粒振幅(±, 0..255)。各向同性「棉絮」感
  fiberFreq:    48,     // 纖維噪聲格數(每 tile)。越大越細。
  hue:          38,     // 極微暖(棉/絹的米白底,非冷灰)。s 很低、l 由像素值決定。
  sat:          12,     // 飽和度(%)。低 → 幾乎無彩,只給一點點暖。
  dyingFollow:  true,   // DYING 時底材是否跟 breathAlpha 一起 fade(身體先於線退場感)
};

// substrate canvas 與其 ctx(全螢幕 static;烤一次,之後只動 style.opacity)
let substrateCanvas = null, substrateCtx = null;
let _substrateW = 0, _substrateH = 0;   // 已烤的 CSS 尺寸(同尺寸不重烤 guard)

// --- 程序生成一張 seamless 織紋 tile,回傳一個 (tile×tile) 的 offscreen canvas ---
// 純 CPU、一次性。經緯 = 正交低頻 sin(整數頻率保證 wrap 無縫);
// 纖維 = 雙線性插值的 value-noise(可 wrap 的整數格點)。輸出像素值刻意低(近黑)。
function _bakeSubstrateTile() {
  const N = SUBSTRATE.tile;
  const tc = document.createElement('canvas');
  tc.width = N; tc.height = N;
  const tctx = tc.getContext('2d');
  const img = tctx.createImageData(N, N);
  const d = img.data;

  // 1) 預生 value-noise 格點(可 wrap:用 (i % G) 取點 → 邊界自動接回)。
  const G = SUBSTRATE.fiberFreq;                 // 噪聲格數
  const grid = new Float32Array(G * G);
  for (let i = 0; i < grid.length; i++) {
    // 三 uniform 平均 → 近高斯,避免噪聲過硬
    grid[i] = (Math.random() + Math.random() + Math.random()) / 3; // 0..1, mean .5
  }
  const sampleNoise = (u, v) => {                // u,v in [0,1)，可 wrap 雙線性
    const fx = u * G, fy = v * G;
    const x0 = Math.floor(fx) % G, y0 = Math.floor(fy) % G;
    const x1 = (x0 + 1) % G,       y1 = (y0 + 1) % G;
    const tx = fx - Math.floor(fx), ty = fy - Math.floor(fy);
    const a = grid[y0 * G + x0], b = grid[y0 * G + x1];
    const c = grid[y1 * G + x0], e = grid[y1 * G + x1];
    const top = a + (b - a) * tx, bot = c + (e - c) * tx;
    return top + (bot - top) * ty;               // 0..1
  };

  const TWO_PI = Math.PI * 2;
  const wF = SUBSTRATE.warpFreq, ftF = SUBSTRATE.weftFreq;
  const wW = SUBSTRATE.warpWeight, ftW = 1 - SUBSTRATE.warpWeight;

  // 預算 hue/sat → 由像素亮度 L 決定每像素 RGB(同色相、亮度起伏 = 織紋)。
  // 直接用 HSL→RGB 一次(同 hue/sat),只有 L 變,所以可逐像素算 L 後轉。
  const hue = SUBSTRATE.hue, sat = SUBSTRATE.sat / 100;

  for (let y = 0; y < N; y++) {
    const v = y / N;
    for (let x = 0; x < N; x++) {
      const u = x / N;
      // 經緯:正交 sin（整數頻率 → x=0 與 x=N 同相位 → 無縫)
      const warp = Math.sin(u * TWO_PI * wF);          // 直紋 (-1..1)
      const weft = Math.sin(v * TWO_PI * ftF);         // 橫紋 (-1..1)
      const weave = (warp * wW + weft * ftW);          // 加權經緯 (-~1..~1)
      // 纖維微粒(各向同性),置中到 ±1
      const fiber = (sampleNoise(u, v) - 0.5) * 2;     // -1..1

      // 像素亮度(0..255):底 meanL + 經緯擾動 + 纖維;clamp >= 0(tooth 不是 floor)
      let L = SUBSTRATE.meanL
            + weave * SUBSTRATE.weaveAmp
            + fiber * SUBSTRATE.fiberAmp;
      if (L < 0) L = 0;
      if (L > 255) L = 255;

      // HSL→RGB(極低 sat、固定 hue;L 用 0..1)
      const Ln = L / 255;
      const c = (1 - Math.abs(2 * Ln - 1)) * sat;
      const hp = hue / 60;
      const xC = c * (1 - Math.abs((hp % 2) - 1));
      let r1 = 0, g1 = 0, b1 = 0;
      if (hp < 1)      { r1 = c; g1 = xC; }
      else if (hp < 2) { r1 = xC; g1 = c; }
      else if (hp < 3) { g1 = c; b1 = xC; }
      else if (hp < 4) { g1 = xC; b1 = c; }
      else if (hp < 5) { r1 = xC; b1 = c; }
      else             { r1 = c; b1 = xC; }
      const m = Ln - c / 2;
      const idx = (y * N + x) * 4;
      d[idx]     = Math.round((r1 + m) * 255);
      d[idx + 1] = Math.round((g1 + m) * 255);
      d[idx + 2] = Math.round((b1 + m) * 255);
      d[idx + 3] = 255;                              // 不透明;真正的「淡」靠 CSS opacity
    }
  }
  tctx.putImageData(img, 0, 0);
  return tc;
}

// --- 一次性把 tile 鋪滿全螢幕 substrate canvas(createPattern,無縫平鋪)---
// 在 resize() 之後呼叫。同 CSS 尺寸不重烤(guard);尺寸變才重鋪。
// 用 CSS 尺寸(非 backing-store):底材不需 HiDPI,1× 即可(更省記憶體、看不出差)。
function bakeSubstrate() {
  if (!SUBSTRATE.enabled || !substrateCanvas) return;
  if (_substrateW === W && _substrateH === H && substrateCanvas.width === W) return; // guard
  // 用 CSS 尺寸當 backing(刻意 dpr=1:織紋本就微觀,HiDPI 浪費)
  substrateCanvas.width = W;
  substrateCanvas.height = H;
  const tile = _bakeSubstrateTile();
  const pat = substrateCtx.createPattern(tile, 'repeat');
  substrateCtx.setTransform(1, 0, 0, 1, 0, 0);
  substrateCtx.clearRect(0, 0, W, H);
  substrateCtx.fillStyle = pat;
  substrateCtx.fillRect(0, 0, W, H);
  _substrateW = W; _substrateH = H;
  // tile canvas 在此 fn 結束後不再被參照 → GC 回收(只活在烤製當下,不洩漏)
}

// --- DOM/canvas setup:建一張 #substrate 放在最底(z-index -1,trace 之下)---
// 在 head <style> 已宣告 #substrate { z-index:-1 } 的前提下,JS 端建立並掛載。
function initSubstrate() {
  if (!SUBSTRATE.enabled) return;
  substrateCanvas = document.createElement('canvas');
  substrateCanvas.id = 'substrate';
  // 內聯保險(即使 <style> 沒加也能正確定位/疊層);CSS 檔內若已有則此為冗餘無害
  substrateCanvas.style.cssText =
    'position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:-1;' +
    'opacity:0;pointer-events:none;';
  // 插在 body 第一個子節點(在 #trace 之前,確保最底)
  document.body.insertBefore(substrateCanvas, document.body.firstChild);
  substrateCtx = substrateCanvas.getContext('2d');
  bakeSubstrate();
}

// --- 每幀:只更新 CSS opacity(零像素操作)。讀 breath/真空狀態,絕不改它們 ---
// 規則:
//   true emptiness(SILENCE+isTrueEmptiness) → 0(身體完全退場 = 真空純度)
//   SILENCE(一般靜默)                        → 0(無物之間黑回死黑)
//   DYING                                     → 跟 breathAlpha 一起 fade(身體先退)
//   其餘(BIRTH/LIVING)                       → intensity(滿身體;BIRTH 隨生命淡入)
function updateSubstrate() {
  if (!SUBSTRATE.enabled || !substrateCanvas) return;
  let op;
  if (breathState === BREATH.SILENCE) {
    op = 0;                                  // 真空 + 一般靜默都歸零
  } else if (breathState === BREATH.DYING && SUBSTRATE.dyingFollow) {
    op = SUBSTRATE.intensity * breathAlpha;  // 身體隨死亡退場
  } else if (breathState === BREATH.BIRTH) {
    op = SUBSTRATE.intensity * breathAlpha;  // 隨生命淡入(breathAlpha BIRTH 期 0→1)
  } else {
    op = SUBSTRATE.intensity;                // LIVING:滿
  }
  // 只在變動夠大時寫 style(避免每幀字串化;opacity 是慢訊號)
  const s = op.toFixed(3);
  if (substrateCanvas.style.opacity !== s) substrateCanvas.style.opacity = s;
}

// === INIT ===
resize(); // deferred until all functions are defined
initBloom();      // 建 offscreen(reuse,永不每幀 new)
initSubstrate();  // 建 #substrate(全螢幕 static,烤一次,之後只動 CSS opacity)
beginLife();

let lastTime = performance.now();
function loop(t) {
  const dt = Math.min(t - lastTime, 50);
  lastTime = t;

  updateMacro(dt);
  lerpField(dt);
  updateBreath(dt);
  updateBN(dt);
  updateCoreBreath(dt);
  updateColorMaturity(dt);
  updatePigment(dt);     // 顏料老化漂移(只動 hue 解析狀態,不碰 field/macro)
  updateSubstrate();     // 底材 CSS opacity(讀 breath/真空,零像素;真空時歸零)

  // True emptiness — clear and draw only buddha-nature glimmer
  if (breathState === BREATH.SILENCE && isTrueEmptiness) {
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    drawBN(); // [Fix #34] glimmer during true emptiness
    ctx.restore();
    requestAnimationFrame(loop);
    return;
  }

  fadeTrace(dt);

  // SANDSTROKE: refill per-frame grain budget (only debited, never freed otherwise →
  // without this, frame 2+ would go black). True-emptiness already returned above, so
  // vacuum frames never reach here (auto-zero). SILENCE has breathAlpha=0 → render block
  // skipped → sandstroke never fires (this line just resets a counter, harmless).
  sandBudgetLeft = SAND.frameBudget;
  // Slow-changing frame seed: grains re-arrange only every ~150ms, otherwise frozen →
  // a faint "standing breath", not boiling noise. Vacuum-safe (no grains drawn anyway).
  sandReseed(((t / 150) | 0) * 2654435761 >>> 0);

  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  if (breathAlpha > 0.001) {
    managePatterns(dt);
    manageBeings(dt);
    // [Fix #36] Render all sorted by r
    renderAllPatterns();

    // ---- BLOOM: rebuild glow every EVERY_N frames, composite back every frame ----
    // (composite is one drawImage; even when build runs every 3rd frame the halo does
    //  not flicker — it's a low-frequency signal, content just updates ~20Hz.)
    bloomFrame++;
    if (bloomFrame % BLOOM.EVERY_N === 0) buildBloom(breathAlpha);
    compositeBloom(breathAlpha);
  }

  drawBN();
  ctx.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ============================================================
//  頌缽 BACKGROUND AUDIO — 純新增模組(不碰任何視覺/模擬靈魂)
//  ------------------------------------------------------------
//  · 引擎原樣移植自 bowl-prototype.html(使用者試聽定案的音色):
//    PARTIALS / initAudio / strike / rnd / master→compressor→warm-lowpass 鏈。
//  · 唯一改動:strike() 不再讀 DOM slider,改讀檔頭 BOWL config 物件。
//  · 全模組封進 IIFE → 對外只露 BowlAudio.{ unlock, tryAutostart };
//    內部 actx/master/comp 一律 local,不污染視覺命名空間(尤其避開
//    既有 `ctx` = 2D canvas context)。
//  · 只「讀」 isTrueEmptiness / breathState / BREATH(外層 module 變數),
//    絕不寫它們。真空(SILENCE+isTrueEmptiness)→ 不排新敲 + master 平滑→0。
// ============================================================

// === BOWL config(現場可調,集中,檔頭級)=========================
//  原型定案預設值;每項都是展演現場可手調的旋鈕。
const BOWL = {
  enabled:    true,   // 總開關(現場可調):false → 完全不出聲、不排程、不生 oscillator。
  volume:     0.5,    // 主音量 0..1(現場可調):展演空間音響再定。原型試聽用 0.6,現場保守起 0.5。
  pitch:      216,    // 基頻 Hz(現場可調):缽的載音高。
  decay:      44,     // 基頻衰減秒數(現場可調):越長尾巴越久;高階泛音按比例較短。
  sustain:    0.35,   // 泛音延音(現場可調)0..1:把上階泛音衰減拉近基頻 → 延長 dB 尾、shimmer 更久。
  beating:    1,      // 拍頻量 ×(現場可調):0=死板,1≈真實慢顫,過大變抖音。
  brightness: 1.4,    // 明亮 ×(現場可調):上階泛音量;高=金屬亮,低=溫暖悶。
  stereo:     0.5,    // 立體聲寬度(現場可調)0..1:拍頻雙生分左右 → warble 在左右間游移。需立體聲輸出。
  transient:  1,      // 敲擊瞬態 ×(現場可調):起音那聲「鎚觸」的量。
  interval:   22,     // 平均敲擊間隔秒(現場可調):實際每次 ×0.8~1.2 變異。
};

(function BowlAudioModule() {
  // ---- 引擎狀態(全 local,不外露)----
  let actx = null, master = null, comp = null;  // actx:避開既有 2D 的 `ctx`
  let voidGain = null;                          // 真空 duck 專用節點(獨立於 master.gain)
  let live = 0, strikes = 0;                     // 診斷計數(GC 健康度)
  let cycleTimer = null;                         // 排程唯一 handle(防重複)
  let voidPollTimer = null;                      // 真空 duck 即時輪詢 handle(讓 audio void 緊跟視覺 void)
  let started = false;                           // startCycle 冪等旗標
  let ducked = false;                            // 真空靜音狀態(避免重複 ramp)

  // ---- 泛音模態表(原樣移植:量測非諧比 + 非單調振幅 + 差異衰減 + 裂模幅)----
  // ratio(對基頻), amp(線性), decayScale(相對,高頻較短), split(裂模幅 fraction)
  const PARTIALS = [
    { r: 1.00,  a: 1.00, d: 1.00, s: 0.0040 },  // (2,0) 載音高
    { r: 2.70,  a: 0.12, d: 0.66, s: 0.0060 },  // (3,0)  ← 第2泛音常最弱(非單調)
    { r: 4.80,  a: 0.17, d: 0.46, s: 0.0080 },  // (4,0)
    { r: 7.50,  a: 0.15, d: 0.34, s: 0.0050 },  // (5,0)
    { r: 10.70, a: 0.22, d: 0.24, s: 0.0095 },  // (6,0) ← 反而較強
    { r: 14.20, a: 0.10, d: 0.17, s: 0.0120 },  // (7,0) 上階跨缽差大→可變異
    { r: 18.20, a: 0.05, d: 0.13, s: 0.0070 },  // (8,0)
  ];

  const rnd = (a, b) => a + Math.random() * (b - a);

  function initAudio() {
    if (actx) return;
    actx = new (window.AudioContext || window.webkitAudioContext)();
    master = actx.createGain();
    // 真空 duck:獨立節點(原型沒有)。strike() 仍照原型寫 master.gain=level,
    // 兩個控制器各管各的 AudioParam,不互搶。預設 1(透通)。
    voidGain = actx.createGain();
    voidGain.gain.value = 1;
    comp = actx.createDynamicsCompressor();           // 安全限幅,防泛音疊加破音
    comp.threshold.value = -10; comp.knee.value = 20; comp.ratio.value = 6;
    const warm = actx.createBiquadFilter();           // 輕微低通,去數位正弦的硬邊
    warm.type = 'lowpass'; warm.frequency.value = 8200; warm.Q.value = 0.4;
    master.connect(voidGain); voidGain.connect(warm); warm.connect(comp); comp.connect(actx.destination);
  }

  // strike():原樣移植,唯「讀 slider」→「讀 BOWL」。變異(per-strike jitter)
  // 對應原型「每敲微變異」勾選的預設 = 恆開(生成作品「從不重複」的 feature)。
  function strike() {
    if (!actx || actx.state !== 'running') return;     // 只在已解鎖且 running 才出聲
    const t = actx.currentTime + 0.02;

    const f0 = BOWL.pitch * rnd(0.99, 1.01);           // 微 pitch 變異
    const decay = BOWL.decay * rnd(0.9, 1.1);          // 微衰減變異
    const beatAmt = BOWL.beating;
    const bright = BOWL.brightness;
    const sustain = BOWL.sustain;                      // 泛音延音:延長上階泛音的 dB 尾
    const transAmt = BOWL.transient;
    const level = BOWL.volume;
    const width = BOWL.stereo;                         // 立體聲寬度
    const strikePan = rnd(-0.12, 0.12);                // 每敲微定位變化
    master.gain.setTargetAtTime(level, actx.currentTime, 0.01);

    // --- 敲擊瞬態:短促濾波雜訊 burst(§5,憑耳朵)---
    if (transAmt > 0.001) {
      const dur = 0.13;
      const buf = actx.createBuffer(1, Math.ceil(actx.sampleRate * dur), actx.sampleRate);
      const dd = buf.getChannelData(0);
      for (let i = 0; i < dd.length; i++) dd[i] = (Math.random()*2-1) * Math.pow(1 - i/dd.length, 3);
      const src = actx.createBufferSource(); src.buffer = buf;
      const bp = actx.createBiquadFilter(); bp.type = 'bandpass';
      bp.frequency.value = f0 * 5.5; bp.Q.value = 0.6;
      const ng = actx.createGain(); ng.gain.value = 0.05 * transAmt * level;
      const tpan = actx.createStereoPanner(); tpan.pan.value = strikePan;
      src.connect(bp); bp.connect(ng); ng.connect(tpan); tpan.connect(master);
      src.start(t); src.stop(t + dur);
      // 瞬態 source 同樣斷開 GC(原型靠 stop 自然回收;這裡顯式 disconnect 防 24/7 累積)
      src.onended = () => { try { src.disconnect(); bp.disconnect(); ng.disconnect(); tpan.disconnect(); } catch(e){} };
    }

    // --- 泛音:每階一對 detune 雙生(A/B 家族)→ 拍頻 ---
    for (const p of PARTIALS) {
      const jitter = (p.r > 3) ? rnd(0.97, 1.03) : 1;   // 上階泛音比可變異
      const baseF = f0 * p.r * jitter;
      const tau = Math.max(0.25, decay * (p.d + (1 - p.d) * sustain));   // sustain↑ → 上階泛音尾巴更長
      const tilt = p.r > 1 ? Math.pow(bright, Math.min(2, p.r / 4)) : 1;  // brightness 偏上階
      const split = p.s * beatAmt * rnd(0.7, 1.3);
      const twins = [
        { f: baseF,             g: 0.62, side: -1 },   // A 家族 → 偏左
        { f: baseF * (1+split), g: 0.40, side: +1 },   // B 家族(略低)→ 偏右;拍頻於是在左右間游移
      ];
      for (const tw of twins) {
        const amp = p.a * tilt * tw.g * 0.9;
        if (amp < 0.0008) continue;
        const osc = actx.createOscillator(); osc.type = 'sine'; osc.frequency.value = tw.f;
        const g = actx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(amp, t + 0.004);              // ~4ms attack 防 click
        g.gain.exponentialRampToValueAtTime(0.0001, t + tau);       // 指數衰減
        const pan = actx.createStereoPanner();
        pan.pan.value = Math.max(-1, Math.min(1, tw.side * width + strikePan));  // 拍頻雙生分左右
        osc.connect(g); g.connect(pan); pan.connect(master);
        osc.start(t); osc.stop(t + tau + 0.05);
        live++;
        osc.onended = () => { live--; try { g.disconnect(); osc.disconnect(); pan.disconnect(); } catch(e){} };
      }
    }
    strikes++;
  }

  // --- 真空靜音 gate:只「讀」 isTrueEmptiness / breathState,不改 ---
  //  真空(SILENCE 且 isTrueEmptiness)→ master ~2s 平滑→0;離開 → 還原。
  //  in-flight 的 ring 不硬切,duck 自然帶它到無聲。回 1 也用 ~1.2s ramp,避免突起。
  function inVoid() { return isTrueEmptiness && breathState === BREATH.SILENCE; }
  function applyVoidGate() {
    if (!actx || !voidGain) return;
    const now = actx.currentTime;
    if (inVoid() && !ducked) {
      ducked = true;
      voidGain.gain.cancelScheduledValues(now);
      voidGain.gain.setTargetAtTime(0, now, 0.7);     // ~2s 內近乎到 0(時間常數 0.7s)
    } else if (!inVoid() && ducked) {
      ducked = false;
      voidGain.gain.cancelScheduledValues(now);
      voidGain.gain.setTargetAtTime(1, now, 0.4);     // ~1.2s 還原
    }
  }

  // --- 無限脈動排程:單一 setTimeout handle;真空時不排新敲(自然沉默)---
  function scheduleNextStrike() {
    clearTimeout(cycleTimer);                          // 永遠先清,保證唯一 handle
    if (!BOWL.enabled || !actx || actx.state !== 'running') { cycleTimer = null; return; }
    const wait = BOWL.interval * 1000 * rnd(0.8, 1.2); // 平均 interval 秒,±20% 變異
    cycleTimer = setTimeout(() => {
      applyVoidGate();              // 進/出真空都在這裡同步 duck(不依賴視覺迴圈)
      if (!inVoid()) strike();      // 真空時:不敲(但仍排下一次去輪詢何時離開真空)
      scheduleNextStrike();
    }, wait);
  }

  // startCycle:冪等。只在 actx 確實 running 後啟動排程(suspended 時不空排)。
  function startCycle() {
    if (started || !BOWL.enabled) return;
    if (!actx || actx.state !== 'running') return;
    started = true;
    // 真空 duck 即時輪詢(~0.4s):讓 audio void 緊跟視覺 void,不被稀疏的敲擊 tick(~18–26s)拖到最壞一個 interval。
    // applyVoidGate 只在狀態切換時動 gain(ducked 旗標守門),其餘輪詢只是兩個布林比較 → 24/7 成本可忽略。
    if (!voidPollTimer) voidPollTimer = setInterval(applyVoidGate, 400);
    applyVoidGate();               // 萬一一啟動就正逢真空,先對齊 duck 狀態
    // 解鎖即先敲一聲(像原型勾「自動循環」時的行為),再進無限脈動。
    if (!inVoid()) strike();
    scheduleNextStrike();
  }

  // resume 後若已 running 就啟動;用 statechange + then 雙保險偵測 running。
  function resumeThenStart() {
    if (!actx) return;
    actx.onstatechange = () => { if (actx.state === 'running') startCycle(); };
    actx.resume().then(() => { if (actx.state === 'running') startCycle(); }).catch(() => {});
  }

  // ---- 對外(兩路徑解鎖)----
  // unlock:訪客第一次點擊呼叫(檔尾 click handler 內)。
  function unlock() {
    if (!BOWL.enabled) return;
    initAudio();
    resumeThenStart();
  }
  // tryAutostart:載入時試一次。kiosk 帶 --autoplay-policy=no-user-gesture-required
  // → 直接 running → 自動開始;一般網頁無手勢 → 維持 suspended、等 unlock()。
  function tryAutostart() {
    if (!BOWL.enabled) return;
    initAudio();
    resumeThenStart();
  }

  window.BowlAudio = { unlock, tryAutostart };
})();

document.addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  // 順手解鎖頌缽(若尚未啟動):initAudio + resume + 冪等啟動排程。
  if (window.BowlAudio) window.BowlAudio.unlock();
});

// 載入時也試一次:kiosk(no-user-gesture-required)會直接 running → 自動開始;
// 一般網頁維持 suspended,等首次點擊由上方 handler 解鎖。
if (window.BowlAudio) window.BowlAudio.tryAutostart();
</script>
</body>
</html>
